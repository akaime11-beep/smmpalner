<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Подключение ВК</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://vk.com; connect-src * 'unsafe-inline' https://vk.com; frame-src * https://vk.com; img-src * data: blob:;">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@vkid/sdk@2.1.0/dist-sdk/umd/index.js"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .active-tab { color: #2563eb; background-color: #eff6ff; border-right: 3px solid #2563eb; }
        .hidden { display: none; }
        .badge-green { background-color: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r flex flex-col z-20">
        <div class="p-6 flex items-center space-x-3 border-b">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa fa-paper-plane"></i></div>
            <span class="font-bold text-lg leading-none">SMM Flow</span>
        </div>
        <nav class="flex-1 py-4">
            <button onclick="switchTab('content')" id="nav-content" class="w-full flex items-center px-6 py-3 text-sm font-medium transition active-tab">
                <i class="fa fa-layer-group w-8"></i> Контент
            </button>
            <button onclick="switchTab('accounts')" id="nav-accounts" class="w-full flex items-center px-6 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 transition">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-xs font-bold text-gray-400 uppercase tracking-widest italic text-blue-500">Запуск...</div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-100 transition">+ Создать пост</button>
        </header>

        <main id="view-content" class="flex-1 p-8 overflow-y-auto bg-gray-50">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4"></div>
        </main>

        <main id="view-accounts" class="hidden flex-1 p-8 overflow-y-auto">
            <div class="max-w-md mx-auto bg-white p-8 rounded-3xl border shadow-sm text-center">
                <i class="fab fa-vk text-5xl text-blue-600 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">ВКонтакте</h3>
                <div id="vk-status-badge" class="mb-6"></div>

                <!-- Контейнер для входа ВК -->
                <div id="vk-onetap-container" class="flex flex-col items-center justify-center min-h-[50px] mb-4">
                    <p class="text-gray-400 text-xs mb-2">Нажмите для авторизации:</p>
                </div>

                <!-- Выбор группы -->
                <div id="group-select-section" class="hidden mt-6 bg-blue-50 p-6 rounded-2xl border border-dashed border-blue-200">
                    <label class="block text-[10px] font-bold text-blue-400 uppercase mb-2 text-left">Выберите ваше сообщество:</label>
                    <select id="vk-group-list" class="w-full border-none bg-white p-3 rounded-xl shadow-sm outline-none mb-4 text-sm font-medium"></select>
                    <button onclick="saveSelectedGroup()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Подтвердить выбор</button>
                    <p class="text-[10px] text-gray-400 mt-2">Видны только группы, где вы Администратор</p>
                </div>

                <div id="account-status" class="mt-8"></div>
            </div>
        </main>
    </div>

    <!-- Модалка -->
    <div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 font-bold text-gray-800">Новая публикация</h3>
            <textarea id="post-text" class="w-full h-32 border border-gray-100 bg-gray-50 rounded-2xl p-4 mb-4 outline-none focus:ring-2 focus:ring-blue-500 transition resize-none" placeholder="Напишите текст..."></textarea>
            <div class="mb-6">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest font-bold">Дата и время</label>
                <input type="datetime-local" id="post-date" class="w-full border bg-gray-50 rounded-xl p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold">Отмена</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold">Запланировать</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempAccessToken = '';

        window.onload = function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            setTimeout(initVKID, 500);
            checkAccountStatus();
            fetchPosts();
        };

        function initVKID() {
            if (window.VKIDSDK) {
                const VKID = window.VKIDSDK;
                VKID.Config.init({
                    app: Number(VK_APP_ID),
                    redirectUrl: 'https://akaime11-beep.github.io/smmpalner',
                    responseMode: VKID.ConfigResponseMode.Callback,
                    source: VKID.ConfigSource.LOWCODE,
                    scope: 'groups,wall,offline', 
                });

                const oneTap = new VKID.OneTap();
                oneTap.render({
                    container: document.getElementById('vk-onetap-container'),
                    showAlternativeLogin: true,
                    styles: { width: 300 }
                })
                .on(VKID.WidgetEvents.ERROR, (err) => {
                    console.error("VKID Error:", err);
                })
                .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, (payload) => {
                    // ВК передает токен в payload
                    if (payload.access_token) {
                        tempAccessToken = payload.access_token;
                        document.getElementById('status-text').innerText = "Авторизация успешна! ⏳";
                        loadGroups();
                    } else {
                        alert("Авторизация прошла, но токен не получен. Попробуйте войти снова.");
                    }
                });
            }
        }

        function loadGroups() {
            // Скрываем кнопку входа, показываем лоадер
            document.getElementById('vk-onetap-container').classList.add('hidden');
            document.getElementById('status-text').innerText = "Загружаем группы... ⏳";
            
            // Получаем группы через JSONP
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempAccessToken}&v=5.131&callback=vkCallback`;
            document.body.appendChild(script);
        }

        window.vkCallback = function(data) {
            const select = document.getElementById('vk-group-list');
            if (data.response && data.response.items && data.response.items.length > 0) {
                select.innerHTML = ''; // Очищаем список
                data.response.items.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id; 
                    opt.text = g.name;
                    select.add(opt);
                });
                // Показываем выбор группы
                document.getElementById('group-select-section').classList.remove('hidden');
                document.getElementById('status-text').innerText = "Выберите
