<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - VKID SDK</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob:; style-src * 'unsafe-inline';">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- ПОДКЛЮЧЕНИЕ VKID SDK -->
    <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
    
    <script src="config.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .active-tab { color: #2563eb; background-color: #eff6ff; border-right: 3px solid #2563eb; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r flex flex-col z-20">
        <div class="p-6 flex items-center space-x-3 border-b">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg"><i class="fa fa-paper-plane"></i></div>
            <span class="font-bold text-lg">SMM Flow</span>
        </div>
        <nav class="flex-1 py-4">
            <button onclick="switchTab('content')" id="nav-content" class="w-full flex items-center px-6 py-3 text-sm font-medium transition active-tab">
                <i class="fa fa-layer-group w-8"></i> Контент
            </button>
            <button onclick="switchTab('accounts')" id="nav-accounts" class="w-full flex items-center px-6 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 transition">
                <i class="fa fa-link w-8"></i> Аккаунты ВК
            </button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col relative">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-sm font-semibold text-gray-400 italic">Загрузка...</div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md transition">+ Создать пост</button>
        </header>

        <main id="view-content" class="flex-1 p-8 overflow-y-auto bg-gray-50">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4"></div>
        </main>

        <main id="view-accounts" class="hidden flex-1 p-8">
            <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border shadow-sm text-center">
                <i class="fab fa-vk text-5xl text-blue-600 mb-4"></i>
                <h2 class="text-xl font-bold mb-6">Подключение ВКонтакте</h2>
                
                <div id="vk-btn-container" class="mb-4">
                    <!-- Кнопка будет создана через SDK -->
                </div>

                <div id="group-select-section" class="hidden mt-4 p-4 bg-gray-50 rounded-xl border border-dashed">
                    <p class="text-xs font-bold text-gray-400 mb-3 text-left uppercase">Выберите сообщество:</p>
                    <select id="vk-group-list" class="w-full border p-3 rounded-xl outline-none mb-4 shadow-sm"></select>
                    <button onclick="saveSelectedGroup()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition">Подтвердить выбор</button>
                </div>

                <div id="account-status" class="mt-6"></div>
            </div>
        </main>
    </div>

    <!-- Модалка -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Новый пост</h3>
            <textarea id="post-text" class="w-full h-32 border rounded-xl p-4 mb-4 outline-none border-gray-100 focus:ring-2 focus:ring-blue-500" placeholder="Ваш текст..."></textarea>
            <input type="datetime-local" id="post-date" class="w-full border rounded-xl p-3 mb-6 outline-none border-gray-100 focus:ring-2 focus:ring-blue-500">
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">Отмена</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-blue-100 shadow-lg">Запланировать</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempAccessToken = '';

        window.onload = function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            initVKID(); // Инициализация SDK
            checkAccount();
            fetchPosts();
        };

        // --- ИНИЦИАЛИЗАЦИЯ VKID SDK ---
        function initVKID() {
            if ('VKIDSDK' in window) {
                const VKID = window.VKIDSDK;

                VKID.Config.init({
                    app: Number(VK_APP_ID), // ID из твоего config.js
                    redirectUrl: 'https://akaime11-beep.github.io/smmpalner',
                    responseMode: VKID.ConfigResponseMode.Callback,
                    source: VKID.ConfigSource.LOWCODE,
                    scope: 'groups,wall,offline', 
                });

                const oneTap = new VKID.OneTap();
                const container = document.getElementById('vk-btn-container');

                if (container) {
                    oneTap.render({
                        container: container,
                        showAlternativeLogin: true,
                        styles: { width: 300 }
                    })
                    .on(VKID.WidgetEvents.ERROR, (err) => alert("Ошибка SDK: " + JSON.stringify(err)))
                    .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, (payload) => {
                        // SDK вернул нам данные для получения токена
                        // В режиме Implicit Flow (через SDK) мы можем получить токен напрямую
                        if (payload.access_token) {
                            tempAccessToken = payload.access_token;
                            loadGroups();
                        } else if (payload.code) {
                            // Если вернулся код, а не токен, значит ВК требует серверного обмена. 
                            // Но мы попробуем запросить именно токен через настройки.
                            alert("Получен код авторизации. Для статических сайтов лучше настроить получение токена.");
                        }
                    });
                }
            }
        }

        // --- ЛОГИКА ГРУПП ---
        function loadGroups() {
            document.getElementById('vk-btn-container').classList.add('hidden');
            document.getElementById('group-select-section').classList.remove('hidden');
            
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempAccessToken}&v=5.131&callback=vkRes`;
            document.body.appendChild(script);
        }

        window.vkRes = function(data) {
            const select = document.getElementById('vk-group-list');
            if (data.response && data.response.items) {
                data.response.items.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id; opt.text = g.name;
                    select.add(opt);
                });
            } else {
                alert("Группы не найдены или нет прав администратора.");
            }
        };

        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const groupId = select.value;
            const groupName = select.options[select.selectedIndex].text;

            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk',
                access_token: tempAccessToken,
                account_name: groupName,
                external_id: '-' + groupId
            }, { onConflict: 'platform' });

            if (!error) {
                alert("Успешно привязано!");
                location.reload();
            }
        }

        // --- ОСТАЛЬНЫЕ ФУНКЦИИ ---
        async function checkAccount() {
            const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
            if (data) {
                document.getElementById('account-status').innerHTML = `<div class="p-3 bg-blue-50 text-blue-700 rounded-lg border border-blue-100 font-bold text-sm">✅ Активен: ${data.account_name}</div>`;
            }
            document.getElementById('status-text').innerText = "Система онлайн ✅";
        }

        async function fetchPosts() {
            const { data, error } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (error) return;
            feed.innerHTML = data.length ? '' : '<p class="text-center text-gray-400 mt-10">Пока нет запланированных постов</p>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-left mb-4";
                card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold uppercase"><span class="text-blue-500">ВК</span><span class="text-gray-400">${new Date(p.publish_date).toLocaleString()}</span></div><p class="text-sm">${p.text}</p><div class="mt-2 text-[9px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded inline-block font-bold">${p.status}</div>`;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const txt = document.getElementById('post-text').value;
            const date = document.getElementById('post-date').value;
            if(!txt || !date) return alert("Заполни всё!");
            const { error } = await supabaseClient.from('posts').insert([{ text: txt, publish_date: date, platform: 'vk', status: 'planned' }]);
            if(!error) { closeModal(); fetchPosts(); }
        }

        function switchTab(t) {
            document.getElementById('view-content').classList.toggle('hidden', t !== 'content');
            document.getElementById('view-accounts').classList.toggle('hidden', t !== 'accounts');
            document.getElementById('nav-content').classList.toggle('active-tab', t === 'content');
            document.getElementById('nav-accounts').classList.toggle('active-tab', t === 'accounts');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
