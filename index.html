<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - FINAL FIX</title>
    <!-- Полная свобода действий для скриптов -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' https://*.vk.com https://unpkg.com; connect-src * 'unsafe-inline' https://*.vk.com https://*.supabase.co; frame-src * https://*.vk.com; img-src * data: blob:;">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Подключаем классическую библиотеку ВК -->
    <script src="https://vk.com/js/api/openapi.js?169" type="text/javascript"></script>
    
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .active-tab { color: #2563eb !important; background-color: #eff6ff !important; border-right: 4px solid #2563eb; }
        .hidden { display: none !important; }
        .btn-vk { background-color: #0077ff; color: white; transition: all 0.2s; }
        .btn-vk:hover { background-color: #0066ee; transform: translateY(-1px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- БОКОВОЕ МЕНЮ -->
    <aside class="w-64 bg-white border-r flex flex-col z-50">
        <div class="p-6 border-b flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fa fa-paper-plane"></i>
            </div>
            <span class="font-bold text-lg">SMM Flow</span>
        </div>
        <nav class="flex-1 py-6">
            <button onclick="switchTab('content')" id="btn-content" class="w-full flex items-center px-6 py-3 text-sm font-bold active-tab">
                <i class="fa fa-layer-group w-8"></i> Публикации
            </button>
            <button onclick="switchTab('accounts')" id="btn-accounts" class="w-full flex items-center px-6 py-3 text-sm font-bold text-slate-400">
                <i class="fa fa-link w-8"></i> Аккаунты ВК
            </button>
        </nav>
    </aside>

    <!-- ОСНОВНОЙ БЛОК -->
    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest italic">Система онлайн ✅</div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg">+ Создать пост</button>
        </header>

        <main id="view-content" class="flex-1 p-8 overflow-y-auto">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4"></div>
        </main>

        <main id="view-accounts" class="hidden flex-1 p-8 overflow-y-auto">
            <div class="max-w-md mx-auto bg-white p-10 rounded-[32px] border shadow-sm text-center">
                <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-6">
                    <i class="fab fa-vk"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">ВКонтакте</h3>
                <p id="vk-info-text" class="text-sm text-slate-400 mb-8">Подключите сообщество для автопостинга</p>

                <!-- КНОПКА ВХОДА -->
                <button id="vk-login-btn" onclick="loginVK()" class="btn-vk w-full py-4 rounded-2xl font-bold shadow-xl shadow-blue-100 flex items-center justify-center space-x-2">
                    <i class="fab fa-vk"></i>
                    <span>ПОДКЛЮЧИТЬ ЧЕРЕЗ VK POPUP</span>
                </button>

                <!-- ВЫБОР ГРУППЫ -->
                <div id="group-select-section" class="hidden mt-6 bg-slate-50 p-6 rounded-[24px] border border-dashed border-slate-200 text-left animate-in slide-in-from-bottom-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Выберите вашу группу:</label>
                    <select id="vk-group-list" class="w-full border-none bg-white p-4 rounded-2xl shadow-sm outline-none mb-4 font-bold text-sm"></select>
                    <button onclick="confirmAccount()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-green-100 transition-all active:scale-95">ПОДТВЕРДИТЬ ВЫБОР</button>
                </div>

                <div id="vk-active-account" class="hidden mt-6 p-4 bg-green-50 text-green-700 rounded-2xl border border-green-100 font-bold text-sm"></div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[32px] w-full max-w-lg p-10 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6">Новая публикация</h3>
            <textarea id="post-text" class="w-full h-40 border border-slate-100 bg-slate-50 rounded-2xl p-5 mb-6 outline-none focus:ring-2 focus:ring-blue-500 transition-all resize-none" placeholder="Напишите текст поста..."></textarea>
            <div class="mb-8">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Дата и время публикации</label>
                <input type="datetime-local" id="post-date" class="w-full border border-slate-100 bg-slate-50 rounded-xl p-3 outline-none font-bold text-sm">
            </div>
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold">ОТМЕНА</button>
                <button onclick="savePost()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100">ЗАПЛАНИРОВАТЬ</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let finalUserToken = '';

        window.onload = async function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            // Инициализация старого доброго OpenAPI
            VK.init({ apiId: Number(VK_APP_ID) });

            await checkAccountStatus();
            await fetchPosts();
        };

        // --- ЛОГИКА АВТОРИЗАЦИИ (POPUP) ---
        function loginVK() {
            VK.Auth.login(function(response) {
                if (response.session) {
                    // Мы получили сессию! Теперь запрашиваем токен с нужными правами
                    // Поскольку мы на статическом сайте, используем старую схему получения токена через редирект во всплывающем окне
                    const redirectUri = 'https://akaime11-beep.github.io/smmpalner/';
                    const authUrl = `https://oauth.vk.com/authorize?client_id=${VK_APP_ID}&display=popup&redirect_uri=${encodeURIComponent(redirectUri)}&scope=groups,wall,offline,admin&response_type=token&v=5.131`;
                    
                    const popup = window.open(authUrl, 'vk_auth', 'width=600,height=600');
                    
                    const timer = setInterval(function() {
                        try {
                            if (popup.location.hash) {
                                const hash = popup.location.hash;
                                const params = new URLSearchParams(hash.replace('#', '?'));
                                finalUserToken = params.get('access_token');
                                
                                if (finalUserToken) {
                                    clearInterval(timer);
                                    popup.close();
                                    loadAdminGroups();
                                }
                            }
                        } catch (e) { /* Игнорируем ошибки кросс-домена пока окно на vk.com */ }
                        
                        if (popup.closed) clearInterval(timer);
                    }, 500);
                } else {
                    alert("Вход отменен или произошла ошибка");
                }
            }, 8192 + 65536 + 262144); // Права: wall, groups, offline
        }

        function loadAdminGroups() {
            document.getElementById('vk-login-btn').classList.add('hidden');
            document.getElementById('status-text').innerText = "Загрузка ваших групп... ⏳";
            
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${finalUserToken}&v=5.131&callback=vkCallback`;
            document.body.appendChild(script);
        }

        window.vkCallback = function(data) {
            const select = document.getElementById('vk-group-list');
            if (data.response && data.response.items && data.response.items.length > 0) {
                select.innerHTML = '';
                data.response.items.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id; opt.text = g.name; select.add(opt);
                });
                document.getElementById('group-select-section').classList.remove('hidden');
                document.getElementById('vk-info-text').innerText = "Аккаунт подключен! Выберите группу.";
            } else {
                alert("Админские группы не найдены. Создайте сообщество в ВК.");
            }
        };

        async function confirmAccount() {
            const select = document.getElementById('vk-group-list');
            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk',
                access_token: finalUserToken,
                account_name: select.options[select.selectedIndex].text,
                external_id: '-' + select.value
            }, { onConflict: 'platform' });

            if (!error) location.reload();
        }

        async function checkAccountStatus() {
            const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
            if (data) {
                document.getElementById('vk-active-account').classList.remove('hidden');
                document.getElementById('vk-active-account').innerText = "✅ АКТИВНО: " + data.account_name;
                document.getElementById('vk-login-btn').innerHTML = "СМЕНИТЬ АККАУНТ";
                document.getElementById('vk-info-text').innerText = "Ваше сообщество успешно привязано";
            }
        }

        // --- ПОСТЫ ---
        async function fetchPosts() {
            const { data } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (!data) return;
            feed.innerHTML = data.length ? '' : '<div class="text-center py-20 text-slate-300 italic font-bold">Лента пуста</div>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[24px] border border-slate-100 shadow-sm text-left mb-4 relative";
                card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold uppercase text-blue-500">ВКонтакте <span class="text-slate-400 font-medium">${new Date(p.publish_date).toLocaleString()}</span></div><p class="text-sm font-medium text-slate-600 leading-relaxed">${p.text}</p><div class="mt-4 flex justify-between items-center"><span class="text-[9px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-bold uppercase tracking-widest">${p.status}</span><button onclick="deletePost(${p.id})" class="text-slate-300 hover:text-red-500"><i class="fa fa-trash-alt text-xs"></i></button></div>`;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const text = document.getElementById('post-text').value;
            const date = document.getElementById('post-date').value;
            if (!text || !date) return alert("Заполни все!");
            await supabaseClient.from('posts').insert([{ text, publish_date: date, platform: 'vk', status: 'planned' }]);
            closeModal(); fetchPosts();
        }

        async function deletePost(id) {
            if (confirm('Удалить?')) { await supabaseClient.from('posts').delete().eq('id', id); fetchPosts(); }
        }

        function switchTab(t) {
            document.getElementById('view-content').classList.toggle('hidden', t !== 'content');
            document.getElementById('view-accounts').classList.toggle('hidden', t !== 'accounts');
            document.getElementById('btn-content').classList.toggle('active-tab', t === 'content');
            document.getElementById('btn-accounts').classList.toggle('active-tab', t === 'accounts');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
