<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow Pro</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob:; style-src * 'unsafe-inline';">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .active-tab { color: #2563eb; background-color: #eff6ff; border-right: 3px solid #2563eb; }
        .hidden { display: none; }
        .badge-green { background-color: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r flex flex-col z-20 shadow-sm">
        <div class="p-6 flex items-center space-x-3 border-b">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa fa-paper-plane"></i></div>
            <span class="font-bold text-lg tracking-tight">SMM Flow</span>
        </div>
        <nav class="flex-1 py-4">
            <button onclick="switchTab('content')" id="nav-content" class="w-full flex items-center px-6 py-3 text-sm font-medium transition active-tab">
                <i class="fa fa-layer-group w-8"></i> Контент
            </button>
            <button onclick="switchTab('accounts')" id="nav-accounts" class="w-full flex items-center px-6 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 transition">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Загрузка системы...</div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-100 transition">
                + Создать публикацию
            </button>
        </header>

        <!-- VIEW: CONTENT -->
        <main id="view-content" class="flex-1 p-8 overflow-y-auto bg-gray-50">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4"></div>
        </main>

        <!-- VIEW: ACCOUNTS -->
        <main id="view-accounts" class="hidden flex-1 p-8 overflow-y-auto">
            <div class="max-w-md mx-auto space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Управление аккаунтами</h2>
                
                <!-- КАРТОЧКА ВК -->
                <div class="bg-white p-6 rounded-3xl border shadow-sm relative overflow-hidden">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl">
                                <i class="fab fa-vk"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-lg">ВКонтакте</h3>
                                <div id="vk-status-badge">Checking...</div>
                            </div>
                        </div>
                    </div>

                    <div id="vk-onetap-container" class="flex justify-center"></div>

                    <div id="group-select-section" class="hidden mt-4 p-4 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Выберите сообщество:</label>
                        <select id="vk-group-list" class="w-full border-none bg-white p-3 rounded-xl shadow-sm outline-none mb-4"></select>
                        <button onclick="saveSelectedGroup()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition">Подтвердить выбор</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl scale-in">
            <h3 class="text-xl font-bold mb-6">Новая публикация</h3>
            
            <textarea id="post-text" class="w-full h-32 border border-gray-100 bg-gray-50 rounded-2xl p-4 mb-4 outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="Что нового?"></textarea>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Тип контента</label>
                    <select id="post-content-type" class="w-full border bg-gray-50 rounded-xl p-2 text-sm outline-none">
                        <option value="post">Обычный пост</option>
                        <option value="story">Сторис</option>
                        <option value="video">Видео</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Дата и время</label>
                    <input type="datetime-local" id="post-date" class="w-full border bg-gray-50 rounded-xl p-2 text-sm outline-none">
                </div>
            </div>

            <div class="flex space-x-3 mt-8">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold">Отмена</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg shadow-blue-100 transition">Запланировать</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempAccessToken = '';

        window.onload = function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            initVKID();
            checkAccountStatus();
            fetchPosts();
        };

        function initVKID() {
            if ('VKIDSDK' in window) {
                const VKID = window.VKIDSDK;
                VKID.Config.init({
                    app: Number(VK_APP_ID),
                    redirectUrl: 'https://akaime11-beep.github.io/smmpalner',
                    responseMode: VKID.ConfigResponseMode.Callback,
                    source: VKID.ConfigSource.LOWCODE,
                    scope: 'groups,wall,offline',
                });

                const oneTap = new VKID.OneTap();
                oneTap.render({
                    container: document.getElementById('vk-onetap-container'),
                    showAlternativeLogin: true,
                    styles: { width: 300 }
                })
                .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, (payload) => {
                    tempAccessToken = payload.access_token || payload.code;
                    loadGroups();
                });
            }
        }

        function loadGroups() {
            document.getElementById('vk-onetap-container').classList.add('hidden');
            document.getElementById('group-select-section').classList.remove('hidden');
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempAccessToken}&v=5.131&callback=vkCallback`;
            document.body.appendChild(script);
        }

        window.vkCallback = function(data) {
            const select = document.getElementById('vk-group-list');
            if (data.response?.items) {
                data.response.items.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id; opt.text = g.name;
                    select.add(opt);
                });
            }
        };

        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk',
                access_token: tempAccessToken,
                account_name: select.options[select.selectedIndex].text,
                external_id: '-' + select.value
            }, { onConflict: 'platform' });

            if (!error) location.reload();
        }

        async function checkAccountStatus() {
            const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
            const badge = document.getElementById('vk-status-badge');
            if (data) {
                badge.innerHTML = `<span class="badge-green">ПОДКЛЮЧЕНО</span> <span class="text-xs text-gray-500 ml-1">${data.account_name}</span>`;
                document.getElementById('vk-onetap-container').innerHTML = `<button onclick="location.reload()" class="text-xs text-blue-600 font-bold hover:underline">Обновить подключение</button>`;
            } else {
                badge.innerHTML = `<span class="text-xs text-gray-400 italic">Не авторизовано</span>`;
            }
            document.getElementById('status-text').innerText = "Система онлайн ✅";
        }

        async function fetchPosts() {
            const { data, error } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (error) return;
            feed.innerHTML = data.length ? '' : '<p class="text-center text-gray-400 mt-20">Лента пуста</p>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border border-gray-100 shadow-sm text-left mb-4 transition hover:shadow-md";
                card.innerHTML = `
                    <div class="flex justify-between mb-3 text-[10px] font-bold uppercase">
                        <span class="text-blue-500"><i class="fab fa-vk"></i> ВК (${p.content_type})</span>
                        <span class="text-gray-400 font-medium">${new Date(p.publish_date).toLocaleString()}</span>
                    </div>
                    <p class="text-gray-700 text-sm leading-relaxed">${p.text}</p>
                    <div class="mt-4 flex items-center justify-between">
                         <span class="text-[9px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-bold uppercase tracking-widest">${p.status}</span>
                         <button onclick="deletePost(${p.id})" class="text-gray-300 hover:text-red-500 transition"><i class="fa fa-trash-alt text-xs"></i></button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const btn = document.getElementById('save-btn');
            const text = document.getElementById('post-text').value;
            const date = document.getElementById('post-date').value;
            const type = document.getElementById('post-content-type').value;

            if (!text || !date) return alert("Заполни данные!");

            btn.innerText = "Сохранение...";
            btn.disabled = true;

            const { error } = await supabaseClient.from('posts').insert([{
                text: text,
                publish_date: date,
                content_type: type,
                platform: 'vk',
                status: 'planned'
            }]);

            if (!error) { closeModal(); fetchPosts(); }
            btn.innerText = "Запланировать"; btn.disabled = false;
        }

        async function deletePost(id) {
            if (confirm('Удалить пост?')) {
                await supabaseClient.from('posts').delete().eq('id', id);
                fetchPosts();
            }
        }

        function switchTab(t) {
            document.getElementById('view-content').classList.toggle('hidden', t !== 'content');
            document.getElementById('view-accounts').classList.toggle('hidden', t !== 'accounts');
            document.getElementById('nav-content').classList.toggle('active-tab', t === 'content');
            document.getElementById('nav-accounts').classList.toggle('active-tab', t === 'accounts');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
