<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Официальный вход</title>
    <!-- Разрешаем работу VK SDK -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' https://*.vk.com https://unpkg.com; connect-src * 'unsafe-inline' https://*.vk.com https://*.supabase.co; frame-src * https://*.vk.com; img-src * data: blob:;">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- ОРИГИНАЛЬНЫЙ СКРИПТ ВК -->
    <script src="https://unpkg.com/@vkid/sdk@2.1.0/dist-sdk/umd/index.js"></script>
    
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .active-tab { color: #2563eb; background-color: #eff6ff; border-right: 3px solid #2563eb; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- МЕНЮ -->
    <aside class="w-64 bg-white border-r flex flex-col z-20">
        <div class="p-6 border-b flex items-center space-x-3 font-bold text-lg text-blue-600">
            <i class="fa fa-paper-plane"></i> <span>SMM Flow</span>
        </div>
        <nav class="flex-1 py-4">
            <button onclick="switchTab('content')" id="nav-content" class="w-full flex items-center px-6 py-3 text-sm active-tab">
                <i class="fa fa-layer-group w-8"></i> Контент
            </button>
            <button onclick="switchTab('accounts')" id="nav-accounts" class="w-full flex items-center px-6 py-3 text-sm text-gray-500">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest italic">Система готова ✅</div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg">+ Создать пост</button>
        </header>

        <!-- ЛЕНТА -->
        <main id="view-content" class="flex-1 p-8 overflow-y-auto bg-gray-50">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4"></div>
        </main>

        <!-- АККАУНТЫ -->
        <main id="view-accounts" class="hidden flex-1 p-8 overflow-y-auto">
            <div class="max-w-md mx-auto bg-white p-10 rounded-3xl border text-center">
                <i class="fab fa-vk text-5xl text-blue-600 mb-6"></i>
                
                <!-- СЮДА ВК ВСТАВИТ КНОПКУ -->
                <div id="vk-onetap-container" class="flex justify-center"></div>

                <!-- ВЫБОР ГРУППЫ -->
                <div id="group-select-section" class="hidden mt-8 p-6 bg-slate-50 rounded-2xl border border-dashed">
                    <p class="text-xs font-bold text-gray-400 mb-4 text-left uppercase tracking-widest">Выберите группу:</p>
                    <select id="vk-group-list" class="w-full border-none bg-white p-3 rounded-xl shadow-sm mb-4 outline-none"></select>
                    <button onclick="saveSelectedGroup()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold shadow-lg">Подключить группу</button>
                </div>

                <div id="account-status" class="mt-8 font-bold text-green-600 text-sm"></div>
            </div>
        </main>
    </div>

    <!-- Модалка -->
    <div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4 text-left">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 font-bold">Новая публикация</h3>
            <textarea id="post-text" class="w-full h-32 border border-gray-100 bg-gray-50 rounded-2xl p-4 mb-4 outline-none" placeholder="Текст..."></textarea>
            <input type="datetime-local" id="post-date" class="w-full border bg-gray-50 rounded-xl p-2 text-sm mb-4 outline-none">
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold">Отмена</button>
                <button onclick="savePost()" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg">Опубликовать</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempToken = '';

        window.onload = function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            checkAccountStatus();
            fetchPosts();
            initVK();
        };

        // --- ТОТ САМЫЙ КОД ВК (АДАПТИРОВАННЫЙ ПОД ОДИН ФАЙЛ) ---
        function initVK() {
            if ('VKIDSDK' in window) {
                const VKID = window.VKIDSDK;

                VKID.Config.init({
                    app: 54580882, // Твой ID
                    redirectUrl: 'https://akaime11-beep.github.io/smmpalner/',
                    responseMode: VKID.ConfigResponseMode.Callback,
                    source: VKID.ConfigSource.LOWCODE,
                    scope: 'groups,wall,offline', // Права, которые нам нужны
                });

                const oneTap = new VKID.OneTap();

                oneTap.render({
                    container: document.getElementById('vk-onetap-container'),
                    showAlternativeLogin: true
                })
                .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, function (payload) {
                    // При успехе ловим токен
                    if (payload.access_token) {
                        tempToken = payload.access_token;
                        loadGroups();
                    } else if (payload.code) {
                        // Если ВК вернул код, обмениваем его на токен через SDK
                        VKID.Auth.exchangeCode(payload.code, payload.device_id)
                          .then(res => {
                              tempToken = res.access_token;
                              loadGroups();
                          })
                          .catch(err => alert("Ошибка обмена кода: " + JSON.stringify(err)));
                    }
                });
            }
        }

        function loadGroups() {
            document.getElementById('vk-onetap-container').classList.add('hidden');
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempToken}&v=5.131&callback=vkRes`;
            document.body.appendChild(script);
        }

        window.vkRes = function(data) {
            const select = document.getElementById('vk-group-list');
            if (data.response?.items?.length > 0) {
                select.innerHTML = '';
                data.response.items.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id; opt.text = g.name; select.add(opt);
                });
                document.getElementById('group-select-section').classList.remove('hidden');
            } else {
                alert("Группы не найдены. Вы должны быть админом.");
            }
        };

        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk', access_token: tempToken, account_name: select.options[select.selectedIndex].text, external_id: '-' + select.value
            }, { onConflict: 'platform' });
            if (!error) location.reload();
        }

        async function checkAccountStatus() {
            try {
                const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
                if (data) {
                    document.getElementById('account-status').innerText = "✅ ПОДКЛЮЧЕНО: " + data.account_name;
                }
            } catch(e) {}
        }

        async function fetchPosts() {
            const { data } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (!data) return;
            feed.innerHTML = data.length ? '' : '<div class="text-center py-20 text-gray-300 italic">Лента пуста</div>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl border border-gray-100 shadow-sm text-left mb-4 relative";
                card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold uppercase text-blue-500">ВКонтакте <span class="text-gray-400 font-medium">${new Date(p.publish_date).toLocaleString()}</span></div><p class="text-gray-700 text-sm leading-relaxed">${p.text}</p><div class="mt-4 flex justify-between items-center"><span class="text-[9px] bg-orange-100 text-orange-600 px-2 py-1 rounded-full font-bold uppercase tracking-widest">${p.status}</span><button onclick="deletePost(${p.id})" class="text-gray-300 hover:text-red-500 transition"><i class="fa fa-trash-alt text-xs"></i></button></div>`;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const text = document.getElementById('post-text').value;
            const date = document.getElementById('post-date').value;
            if (!text || !date) return alert("Заполни данные!");
            await supabaseClient.from('posts').insert([{ text, publish_date: date, platform: 'vk', status: 'planned' }]);
            closeModal(); fetchPosts();
        }

        async function deletePost(id) {
            if (confirm('Удалить пост?')) { await supabaseClient.from('posts').delete().eq('id', id); fetchPosts(); }
        }

        function switchTab(t) {
            document.getElementById('view-content').classList.toggle('hidden', t !== 'content');
            document.getElementById('view-accounts').classList.toggle('hidden', t !== 'accounts');
            document.getElementById('nav-content').classList.toggle('text-blue-600', t === 'content');
            document.getElementById('nav-accounts').classList.toggle('text-blue-600', t === 'accounts');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
