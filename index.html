<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Авторизация ВК</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob:; style-src * 'unsafe-inline';">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .active-tab { color: #2563eb; background-color: #eff6ff; border-right: 3px solid #2563eb; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Боковое меню -->
    <aside class="w-64 bg-white border-r flex flex-col">
        <div class="p-6 border-b font-bold text-xl text-blue-600 flex items-center">
            <i class="fa fa-paper-plane mr-2"></i> SMM Flow
        </div>
        <nav class="flex-1 py-4">
            <button onclick="switchTab('content')" id="nav-content" class="w-full flex items-center px-6 py-3 text-sm active-tab">
                <i class="fa fa-layer-group w-8"></i> Контент
            </button>
            <button onclick="switchTab('accounts')" id="nav-accounts" class="w-full flex items-center px-6 py-3 text-sm text-gray-500 hover:bg-gray-50">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-sm font-semibold text-gray-400 italic">Загрузка системы...</div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-blue-700 transition">+ Создать пост</button>
        </header>

        <!-- ВКЛАДКА КОНТЕНТ -->
        <section id="view-content" class="p-8 overflow-y-auto bg-gray-50 flex-1">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4"></div>
        </section>

        <!-- ВКЛАДКА АККАУНТЫ -->
        <section id="view-accounts" class="hidden p-8 flex-1">
            <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border shadow-sm text-center">
                <i class="fab fa-vk text-5xl text-blue-600 mb-4"></i>
                <h2 class="text-xl font-bold mb-4">Подключение ВКонтакте</h2>
                
                <div id="vk-auth-section">
                    <button onclick="startVKAuth()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">
                        1. Войти через ВК
                    </button>
                </div>

                <div id="group-select-section" class="hidden mt-4 space-y-4">
                    <p class="text-sm text-gray-500 text-left">Выберите группу для постинга:</p>
                    <select id="vk-group-list" class="w-full border p-3 rounded-xl outline-none"></select>
                    <button onclick="saveSelectedGroup()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition">
                        2. Подтвердить выбор
                    </button>
                </div>

                <div id="account-status" class="mt-6 text-sm font-medium text-gray-400"></div>
            </div>
        </section>
    </main>

    <!-- Модалка создания поста (сокращенная версия) -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Новый пост</h3>
            <textarea id="post-text" class="w-full h-32 border rounded-xl p-4 mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ваш текст..."></textarea>
            <input type="datetime-local" id="post-date" class="w-full border rounded-xl p-3 mb-6 outline-none">
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">Отмена</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Запланировать</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempToken = '';

        window.onload = function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            handleAuthCallback(); // Проверяем, вернулись ли мы из ВК
            checkExistingAccount();
            fetchPosts();
        };

        // --- ЛОГИКА ВК ---

        function startVKAuth() {
            const redirectUri = window.location.origin + window.location.pathname;
            const scope = 'groups,wall,offline,admin';
            const authUrl = `https://oauth.vk.com/authorize?client_id=${VK_APP_ID}&display=page&redirect_uri=${redirectUri}&scope=${scope}&response_type=token&v=5.131`;
            window.location.href = authUrl;
        }

        async function handleAuthCallback() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                tempToken = params.get('access_token');
                window.location.hash = ''; // Чистим адресную строку
                loadAdminGroups();
            }
        }

        async function loadAdminGroups() {
            document.getElementById('vk-auth-section').classList.add('hidden');
            document.getElementById('group-select-section').classList.remove('hidden');
            
            // Используем JSONP для обхода CORS (особенность ВК для браузеров)
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempToken}&v=5.131&callback=vkCallback`;
            document.body.appendChild(script);
        }

        window.vkCallback = function(response) {
            const select = document.getElementById('vk-group-list');
            if (response.response && response.response.items) {
                response.response.items.forEach(group => {
                    const opt = document.createElement('option');
                    opt.value = group.id;
                    opt.text = group.name;
                    select.add(opt);
                });
            } else {
                alert("Не удалось загрузить список групп. Убедитесь, что вы админ.");
            }
        };

        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const groupId = select.value;
            const groupName = select.options[select.selectedIndex].text;

            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk',
                access_token: tempToken,
                account_name: groupName,
                external_id: '-' + groupId // Сохраняем сразу с минусом для ВК
            }, { onConflict: 'platform' });

            if (!error) {
                alert("Аккаунт успешно привязан!");
                location.reload();
            } else {
                alert("Ошибка БД: " + error.message);
            }
        }

        async function checkExistingAccount() {
            const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').single();
            if (data) {
                document.getElementById('account-status').innerHTML = 
                    `<div class="p-3 bg-green-50 text-green-700 rounded-lg border border-green-200">
                        ✅ Подключено сообщество: <br><strong>${data.account_name}</strong>
                     </div>`;
                document.getElementById('vk-auth-section').innerHTML = 
                    `<button onclick="startVKAuth()" class="w-full border border-blue-200 text-blue-600 py-2 rounded-xl text-sm">Сменить аккаунт</button>`;
            }
            document.getElementById('status-text').innerText = "Система онлайн ✅";
        }

        // --- СТАНДАРТНЫЕ ФУНКЦИИ ---
        function switchTab(tab) {
            document.getElementById('view-content').classList.toggle('hidden', tab !== 'content');
            document.getElementById('view-accounts').classList.toggle('hidden', tab !== 'accounts');
            document.getElementById('nav-content').classList.toggle('active-tab', tab === 'content');
            document.getElementById('nav-accounts').classList.toggle('active-tab', tab === 'accounts');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function fetchPosts() {
            const { data, error } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            if (!error) {
                const feed = document.getElementById('post-feed');
                feed.innerHTML = data.length ? '' : '<p class="text-center text-gray-400 mt-10 text-sm italic">Постов пока нет. Нажмите «Создать пост».</p>';
                data.forEach(post => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-left mb-4";
                    card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold uppercase"><span class="text-blue-500">${post.platform}</span><span class="text-gray-400">${new Date(post.publish_date).toLocaleString()}</span></div><p class="text-gray-700 text-sm">${post.text}</p><div class="mt-3 text-[10px] bg-orange-50 text-orange-600 px-2 py-1 rounded inline-block font-bold">${post.status}</div>`;
                    feed.appendChild(card);
                });
            }
        }

        async function savePost() {
            const txt = document.getElementById('post-text').value;
            const date = document.getElementById('post-date').value;
            if (!txt || !date) return alert("Заполни все!");
            const { error } = await supabaseClient.from('posts').insert([{ text: txt, publish_date: date, platform: 'vk', status: 'planned' }]);
            if (!error) { closeModal(); fetchPosts(); }
        }
    </script>
</body>
</html>
