<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Рабочая версия</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем библиотеку правильно -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .active-tab { color: #2563eb; background-color: #eff6ff; border-right: 3px solid #2563eb; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex h-screen">

    <!-- Меню слева -->
    <aside class="w-64 bg-white border-r flex flex-col">
        <div class="p-6 border-b font-bold text-xl text-blue-600 flex items-center">
            <i class="fa fa-paper-plane mr-2"></i> SMM Flow
        </div>
        <nav class="flex-1 py-4">
            <button onclick="switchTab('content')" class="w-full flex items-center px-6 py-3 text-sm active-tab" id="btn-content">
                <i class="fa fa-layer-group w-8"></i> Контент
            </button>
            <button onclick="switchTab('accounts')" class="w-full flex items-center px-6 py-3 text-sm text-gray-500" id="btn-accounts">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <span class="text-gray-600 font-medium">Панель управления</span>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-blue-700 transition">
                + Создать пост
            </button>
        </header>

        <section id="view-content" class="p-8 overflow-y-auto">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4">
                <p class="text-center text-gray-400">Загрузка постов...</p>
            </div>
        </section>

        <section id="view-accounts" class="hidden p-8">
            <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl border">
                <h2 class="font-bold mb-4">Подключенные сервисы</h2>
                <div class="p-3 border rounded-lg mb-2">Telegram Bot: <span class="text-green-500 font-bold">АКТИВЕН</span></div>
            </div>
        </section>
    </main>

    <!-- Модальное окно -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-2xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Новый пост</h3>
            <textarea id="post-text" class="w-full h-32 border border-gray-200 rounded-xl p-4 mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Текст поста..."></textarea>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">ДАТА</label>
                    <input type="datetime-local" id="post-date" class="w-full border rounded-lg p-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">СОЦСЕТЬ</label>
                    <select id="post-platform" class="w-full border rounded-lg p-2 text-sm">
                        <option value="tg">Telegram</option>
                        <option value="vk">ВКонтакте</option>
                    </select>
                </div>
            </div>

            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">Отмена</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // --- ВСТАВЬ СВОИ ДАННЫЕ СЮДА ---
        const SUPABASE_URL = 'wssmpxdsecqagfvetzqh';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indzc21weGRzZWNxYWdmdmV0enFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNTEwMzMsImV4cCI6MjA5MzYyNzAzM30.1JTM3XGbkY6u2e4p-vLTZvhW-u36_4ryr5u_boI7Q80';
        // -------------------------------

        // Инициализация клиента (исправлено название)
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Функция открытия модалки (теперь точно сработает)
        function openModal() {
            console.log("Открываю окно...");
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function switchTab(tab) {
            document.getElementById('view-content').classList.toggle('hidden', tab !== 'content');
            document.getElementById('view-accounts').classList.toggle('hidden', tab !== 'accounts');
            document.getElementById('btn-content').classList.toggle('active-tab', tab === 'content');
            document.getElementById('btn-accounts').classList.toggle('active-tab', tab === 'accounts');
        }

        async function fetchPosts() {
            const { data, error } = await supabaseClient
                .from('posts')
                .select('*')
                .order('publish_date', { ascending: false });

            if (error) {
                console.error("Ошибка загрузки:", error);
                return;
            }
            renderPosts(data);
        }

        function renderPosts(posts) {
            const feed = document.getElementById('post-feed');
            feed.innerHTML = posts.length ? '' : '<p class="text-center text-gray-400">Постов пока нет</p>';
            
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl border border-gray-100 shadow-sm mb-4";
                card.innerHTML = `
                    <div class="flex justify-between mb-2 text-[10px] font-bold uppercase">
                        <span class="text-blue-500">${post.platform}</span>
                        <span class="text-gray-400">${new Date(post.publish_date).toLocaleString()}</span>
                    </div>
                    <p class="text-gray-700 text-sm">${post.text}</p>
                    <div class="mt-3 text-[10px] text-orange-400 font-bold uppercase">Статус: ${post.status}</div>
                `;
                feed.appendChild(card);
            });
        }

                alert("Заполните текст и дату!");
                return;
            }
