<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Рабочая версия</title>
    <!-- Полное разрешение на работу всех скриптов -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob:; style-src * 'unsafe-inline';">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .active-tab { color: #2563eb !important; background-color: #eff6ff !important; border-right: 3px solid #2563eb; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- МЕНЮ -->
    <aside class="w-64 bg-white border-r flex flex-col z-50">
        <div class="p-6 border-b flex items-center space-x-2">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold italic">S</div>
            <span class="font-bold text-lg">SMM Flow</span>
        </div>
        <nav class="flex-1 py-4">
            <button onclick="switchTab('content')" id="btn-content" class="w-full flex items-center px-6 py-3 text-sm font-medium active-tab">
                <i class="fa fa-layer-group w-8"></i> Контент
            </button>
            <button onclick="switchTab('accounts')" id="btn-accounts" class="w-full flex items-center px-6 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <!-- КОНТЕНТ -->
    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest italic">Запуск...</div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-lg transition">
                + Создать пост
            </button>
        </header>

        <main id="view-content" class="flex-1 p-8 overflow-y-auto">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4">
                <p class="text-center text-gray-400 mt-20">Загрузка постов...</p>
            </div>
        </main>

        <main id="view-accounts" class="hidden flex-1 p-8">
            <div class="max-w-md mx-auto bg-white p-8 rounded-3xl border shadow-sm text-center">
                <i class="fab fa-vk text-5xl text-blue-600 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">ВКонтакте</h3>
                <div id="vk-status-badge" class="mb-6 text-gray-400 text-xs italic">Аккаунт не подключен</div>

                <div id="vk-actions">
                    <button onclick="startVKAuth()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition">
                        ПОДКЛЮЧИТЬ ЧЕРЕЗ ВК
                    </button>
                </div>

                <!-- Выбор группы (скрыт по умолчанию) -->
                <div id="group-select-section" class="hidden mt-6 p-4 bg-slate-50 rounded-2xl border border-dashed text-left">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Выберите сообщество:</label>
                    <select id="vk-group-list" class="w-full border p-2 rounded-lg mb-4 outline-none"></select>
                    <button onclick="saveGroup()" class="w-full bg-green-500 text-white py-2 rounded-lg font-bold shadow-md">Подтвердить выбор</button>
                </div>
            </div>
        </main>
    </div>

    <!-- МОДАЛКА -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Новая публикация</h3>
            <textarea id="post-text" class="w-full h-32 border rounded-2xl p-4 mb-4 outline-none focus:ring-2 focus:ring-blue-500 border-gray-100" placeholder="Ваш текст..."></textarea>
            <input type="datetime-local" id="post-date" class="w-full border rounded-xl p-2 mb-6 outline-none border-gray-100">
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold">Отмена</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg">Запланировать</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempToken = '';

        // Старт системы
        window.onload = async function() {
            console.log("Приложение запущено");
            if (typeof S_URL === 'undefined') {
                alert("Ошибка: config.js не найден!");
                return;
            }

            try {
                supabaseClient = supabase.createClient(S_URL, S_KEY);
                document.getElementById('status-text').innerText = "База подключена ✅";
                
                handleAuthCallback(); // Проверяем возврат из ВК
                await checkAccount();
                await fetchPosts();
            } catch (e) {
                console.error("Ошибка инициализации:", e);
                document.getElementById('status-text').innerText = "Ошибка БД ❌";
            }
        };

        // Вход ВК
        function startVKAuth() {
            // ВНИМАНИЕ: Используем адрес из твоего GitHub
            const redirectUri = 'https://akaime11-beep.github.io/smmpalner/'; 
            const authUrl = `https://oauth.vk.com/authorize?client_id=${VK_APP_ID}&display=page&redirect_uri=${encodeURIComponent(redirectUri)}&scope=groups,wall,offline,admin&response_type=token&v=5.131`;
            
            console.log("Переход на ВК:", authUrl);
            window.location.href = authUrl;
        }

        // Обработка возврата из ВК
        function handleAuthCallback() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                tempToken = params.get('access_token');
                
                // Скрываем токен из строки и переключаемся на вкладку аккаунтов
                window.history.replaceState(null, null, window.location.pathname);
                switchTab('accounts');
                loadAdminGroups();
            }
        }

        // Загрузка групп (JSONP)
        function loadAdminGroups() {
            document.getElementById('status-text').innerText = "Загрузка групп... ⏳";
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempToken}&v=5.131&callback=vkCallbackFunc`;
            document.body.appendChild(script);
        }

        window.vkCallbackFunc = function(data) {
            const select = document.getElementById('vk-group-list');
            if (data.response && data.response.items) {
                select.innerHTML = '';
                data.response.items.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id; opt.text = g.name;
                    select.add(opt);
                });
                document.getElementById('group-select-section').classList.remove('hidden');
                document.getElementById('vk-actions').classList.add('hidden');
                document.getElementById('status-text').innerText = "Выберите группу ✅";
            } else {
                alert("Группы не найдены. Вы точно админ?");
            }
        };

        // Сохранение в базу
        async function saveGroup() {
            const select = document.getElementById('vk-group-list');
            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk',
                access_token: tempToken,
                account_name: select.options[select.selectedIndex].text,
                external_id: '-' + select.value
            }, { onConflict: 'platform' });

            if (!error) {
                alert("Успешно привязано!");
                location.reload();
            } else {
                alert("Ошибка сохранения: " + error.message);
            }
        }

        // Проверка аккаунта
        async function checkAccount() {
            const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
            if (data) {
                document.getElementById('vk-status-badge').innerHTML = `<span class="badge-green">ПОДКЛЮЧЕНО: ${data.account_name}</span>`;
                document.getElementById('vk-actions').innerHTML = `<button onclick="startVKAuth()" class="text-blue-600 text-xs font-bold hover:underline">Сменить группу</button>`;
            }
        }

        // Посты
        async function fetchPosts() {
            const { data, error } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (error) return;
            feed.innerHTML = data.length ? '' : '<div class="text-center py-20 text-gray-300 italic">Лента пуста</div>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl border border-gray-100 shadow-sm text-left mb-4 relative";
                card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold uppercase text-blue-500">ВКонтакте <span class="text-gray-400 font-medium">${new Date(p.publish_date).toLocaleString()}</span></div><p class="text-gray-700 text-sm leading-relaxed">${p.text}</p><div class="mt-4 flex justify-between items-center"><span class="text-[9px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-bold uppercase tracking-widest">${p.status}</span><button onclick="deletePost(${p.id})" class="text-gray-300 hover:text-red-500 transition"><i class="fa fa-trash-alt text-xs"></i></button></div>`;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const txt = document.getElementById('post-text').value;
            const date = document.getElementById('post-date').value;
            if(!txt || !date) return alert("Заполни все!");
            const { error } = await supabaseClient.from('posts').insert([{ text: txt, publish_date: date, platform: 'vk', status: 'planned' }]);
            if(!error) { closeModal(); fetchPosts(); }
        }

        async function deletePost(id) {
            if(confirm('Удалить?')) { await supabaseClient.from('posts').delete().eq('id', id); fetchPosts(); }
        }

        // ВКЛАДКИ
        function switchTab(tabId) {
            console.log("Переключаю на:", tabId);
            // Прячем все разделы
            document.getElementById('view-content').classList.add('hidden');
            document.getElementById('view-accounts').classList.add('hidden');
            // Сбрасываем кнопки
            document.getElementById('btn-content').classList.remove('active-tab');
            document.getElementById('btn-accounts').classList.remove('active-tab');
            // Показываем нужный
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('active-tab');
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
