<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Подключение</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' https://*.vk.com https://unpkg.com; connect-src * 'unsafe-inline' https://*.vk.com https://*.supabase.co; frame-src * https://*.vk.com; img-src * data: blob:;">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .active-tab { color: #2563eb; background-color: #eff6ff; border-right: 3px solid #2563eb; }
        .hidden { display: none; }
        .badge-green { background-color: #dcfce7; color: #166534; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Боковое меню -->
    <aside class="w-64 bg-white border-r flex flex-col z-20">
        <div class="p-6 flex items-center space-x-3 border-b">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa fa-paper-plane"></i></div>
            <span class="font-bold text-lg">SMM Flow</span>
        </div>
        <nav class="flex-1 py-4">
            <button onclick="switchTab('content')" id="nav-content" class="w-full flex items-center px-6 py-3 text-sm font-medium transition active-tab">
                <i class="fa fa-layer-group w-8"></i> Контент
            </button>
            <button onclick="switchTab('accounts')" id="nav-accounts" class="w-full flex items-center px-6 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 transition">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <!-- Главная область -->
    <div class="flex-1 flex flex-col relative">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-xs font-bold text-gray-400 uppercase tracking-widest italic">Система готова ✅</div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg transition">+ Создать публикацию</button>
        </header>

        <main id="view-content" class="flex-1 p-8 overflow-y-auto bg-gray-50">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4 font-bold text-gray-400"></div>
        </main>

        <main id="view-accounts" class="hidden flex-1 p-8 overflow-y-auto">
            <div class="max-w-md mx-auto bg-white p-8 rounded-3xl border shadow-sm text-center">
                <i class="fab fa-vk text-5xl text-blue-600 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">ВКонтакте</h3>
                <div id="vk-status-badge" class="mb-6 text-gray-400 text-xs italic">Авторизация не выполнена</div>

                <!-- НАДЕЖНАЯ КНОПКА ВХОДА -->
                <div id="vk-auth-controls">
                    <button onclick="startVKAuth()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg flex items-center justify-center space-x-2">
                        <i class="fab fa-vk"></i>
                        <span>Подключить профиль ВК</span>
                    </button>
                    <p class="text-[10px] text-gray-400 mt-4 uppercase font-bold tracking-tighter">Нажмите, чтобы получить список ваших групп</p>
                </div>

                <!-- ВЫБОР ГРУППЫ (Появится после клика по кнопке выше) -->
                <div id="group-select-section" class="hidden mt-6 bg-blue-50 p-6 rounded-2xl border border-dashed border-blue-200 text-left">
                    <label class="block text-[10px] font-bold text-blue-400 uppercase mb-2">Выберите сообщество для постинга:</label>
                    <select id="vk-group-list" class="w-full border-none bg-white p-3 rounded-xl shadow-sm outline-none mb-4 text-sm font-medium"></select>
                    <button onclick="saveSelectedGroup()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Подтвердить выбор</button>
                </div>

                <div id="account-status" class="mt-8"></div>
            </div>
        </main>
    </div>

    <!-- Модалка -->
    <div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4 text-left">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Новая публикация</h3>
            <textarea id="post-text" class="w-full h-32 border border-gray-100 bg-gray-50 rounded-2xl p-4 mb-4 outline-none focus:ring-2 focus:ring-blue-500 transition resize-none" placeholder="Текст поста..."></textarea>
            <div class="mb-6">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Дата и время</label>
                <input type="datetime-local" id="post-date" class="w-full border bg-gray-50 rounded-xl p-2 text-sm outline-none">
            </div>
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold">Отмена</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg transition">Запланировать</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempAccessToken = '';
        const REDIRECT_URI = 'https://akaime11-beep.github.io/smmpalner/';

        window.onload = function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            // Проверка: вернулись ли мы из ВК с токеном?
            handleCallback();
            checkAccountStatus();
            fetchPosts();
        };

        // ФУНКЦИЯ ВХОДА (Открывает ВК)
        function startVKAuth() {
            const scope = 'groups,wall,offline,admin';
            const authUrl = `https://oauth.vk.com/authorize?client_id=${VK_APP_ID}&display=page&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${scope}&response_type=token&v=5.131`;
            window.location.href = authUrl;
        }

        // ЛОВИМ ТОКЕН ИЗ АДРЕСНОЙ СТРОКИ
        function handleCallback() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                tempAccessToken = params.get('access_token');
                
                // Скрываем токен из адреса
                window.history.replaceState(null, null, window.location.pathname);
                
                // Сразу загружаем группы
                loadGroups();
            }
        }

        // ЗАГРУЗКА ГРУПП ЧЕРЕЗ API ВК
        function loadGroups() {
            document.getElementById('vk-auth-controls').classList.add('hidden');
            document.getElementById('status-text').innerText = "Загрузка ваших групп... ⏳";
            
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempAccessToken}&v=5.131&callback=vkCallback`;
            document.body.appendChild(script);
        }

        window.vkCallback = function(data) {
            const select = document.getElementById('vk-group-list');
            if (data.response && data.response.items && data.response.items.length > 0) {
                select.innerHTML = '';
                data.response.items.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id; opt.text = g.name; select.add(opt);
                });
                document.getElementById('group-select-section').classList.remove('hidden');
                document.getElementById('status-text').innerText = "Выберите группу ✅";
            } else {
                alert("Админские группы не найдены. Создайте группу в ВК и попробуйте снова.");
                document.getElementById('vk-auth-controls').classList.remove('hidden');
            }
        };

        // СОХРАНЕНИЕ ВЫБРАННОЙ ГРУППЫ В БАЗУ
        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const groupId = select.value;
            const groupName = select.options[select.selectedIndex].text;

            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk',
                access_token: tempAccessToken,
                account_name: groupName,
                external_id: '-' + groupId
            }, { onConflict: 'platform' });

            if (!error) {
                alert("Сообщество " + groupName + " успешно подключено!");
                location.reload();
            } else {
                alert("Ошибка сохранения: " + error.message);
            }
        }

        async function checkAccountStatus() {
            const badge = document.getElementById('vk-status-badge');
            const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
            if (data) {
                badge.innerHTML = `<span class="badge-green">ПОДКЛЮЧЕНО</span> <div class="text-[10px] text-gray-500 mt-1 font-bold italic">${data.account_name}</div>`;
                document.getElementById('vk-auth-controls').innerHTML = `<button onclick="startVKAuth()" class="text-xs text-blue-600 font-bold hover:underline">Сменить сообщество</button>`;
            }
        }

        async function fetchPosts() {
            const { data } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (!data) return;
            feed.innerHTML = data.length ? '' : '<div class="text-center py-20 text-gray-300 italic">Лента пуста</div>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border border-gray-100 shadow-sm text-left mb-4 relative";
                card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold uppercase"><span class="text-blue-500 font-bold"><i class="fab fa-vk"></i> ВК</span><span class="text-gray-400 font-medium">${new Date(p.publish_date).toLocaleString()}</span></div><p class="text-gray-700 text-sm leading-relaxed">${p.text}</p><div class="mt-4 flex justify-between items-center"><span class="text-[9px] bg-orange-100 text-orange-600 px-2 py-1 rounded-full font-bold uppercase tracking-widest">${p.status}</span><button onclick="deletePost(${p.id})" class="text-gray-300 hover:text-red-500 transition"><i class="fa fa-trash-alt text-xs"></i></button></div>`;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const text = document.getElementById('post-text').value;
            const date = document.getElementById('post-date').value;
            if (!text || !date) return alert("Заполни все!");
            await supabaseClient.from('posts').insert([{ text, publish_date: date, platform: 'vk', status: 'planned' }]);
            closeModal(); fetchPosts();
        }

        async function deletePost(id) {
            if (confirm('Удалить?')) { await supabaseClient.from('posts').delete().eq('id', id); fetchPosts(); }
        }

        function switchTab(t) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById('view-' + t).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('nav-' + t).classList.add('active-tab');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
