<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Debug Version</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' https://*.vk.com; connect-src * 'unsafe-inline' https://*.vk.com https://*.supabase.co; frame-src * https://*.vk.com; img-src * data: blob:;">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .active-tab { color: #2563eb !important; background-color: #eff6ff !important; border-right: 3px solid #2563eb; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <aside class="w-64 bg-white border-r flex flex-col z-50">
        <div class="p-6 border-b flex items-center space-x-2 font-bold text-lg text-blue-600">
            <i class="fa fa-paper-plane"></i> <span>SMM Flow</span>
        </div>
        <nav class="flex-1 py-4">
            <button onclick="switchTab('content')" id="btn-content" class="w-full flex items-center px-6 py-3 text-sm font-medium active-tab">Публикации</button>
            <button onclick="switchTab('accounts')" id="btn-accounts" class="w-full flex items-center px-6 py-3 text-sm font-medium text-slate-400">Аккаунты</button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-xs font-bold text-blue-500 uppercase">Система готова ✅</div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ Пост</button>
        </header>

        <main id="view-content" class="flex-1 p-8 overflow-y-auto">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4"></div>
        </main>

        <main id="view-accounts" class="hidden flex-1 p-8">
            <div class="max-w-md mx-auto bg-white p-10 rounded-[32px] border text-center">
                <i class="fab fa-vk text-5xl text-blue-600 mb-6"></i>
                <div id="vk-area">
                    <button onclick="startVK()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">ПОДКЛЮЧИТЬ ВК</button>
                </div>
                <div id="group-select" class="hidden mt-6 bg-slate-50 p-6 rounded-2xl border border-dashed text-left">
                    <select id="vk-group-list" class="w-full p-3 rounded-xl mb-4 outline-none font-bold text-sm"></select>
                    <button onclick="confirmGroup()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold">ПОДТВЕРДИТЬ</button>
                </div>
                <div id="active-acc" class="hidden mt-6 p-4 bg-green-50 text-green-700 rounded-xl border font-bold text-sm"></div>
            </div>
        </main>
    </div>

    <!-- Модалка -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl">
            <textarea id="post-text" class="w-full h-32 border rounded-2xl p-4 mb-4 outline-none" placeholder="Текст..."></textarea>
            <input type="datetime-local" id="post-date" class="w-full border rounded-xl p-2 mb-4">
            <button onclick="savePost()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold">СОХРАНИТЬ</button>
            <button onclick="closeModal()" class="w-full mt-2 text-slate-400">Отмена</button>
        </div>
    </div>

    <script>
        let sb;
        let userToken = '';

        window.onload = function() {
            if (typeof S_URL === 'undefined') return;
            sb = supabase.createClient(S_URL, S_KEY);
            checkVKHash();
            loadContent();
            checkSavedAccount();
        };

        function startVK() {
            // МАКСИМАЛЬНО ЖЕСТКАЯ ПРОВЕРКА
            const redirect = 'https://akaime11-beep.github.io/smmpalner/'; 
            
            // Если вылезет Security Error - проверьте, что этот адрес совпадает с ВК!
            console.log("Redirecting to:", redirect);

            const url = `https://oauth.vk.com/authorize?client_id=${VK_APP_ID}&display=page&redirect_uri=${encodeURIComponent(redirect)}&scope=groups,wall,offline,admin&response_type=token&v=5.131`;
            window.location.href = url;
        }

        function checkVKHash() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                userToken = params.get('access_token');
                window.history.replaceState(null, null, window.location.pathname);
                switchTab('accounts');
                fetchGroups();
            }
        }

        function fetchGroups() {
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${userToken}&v=5.131&callback=vkIn`;
            document.body.appendChild(script);
        }

        window.vkIn = function(data) {
            const select = document.getElementById('vk-group-list');
            if (data.response && data.response.items.length > 0) {
                select.innerHTML = '';
                data.response.items.forEach(g => {
                    const o = document.createElement('option');
                    o.value = g.id; o.text = g.name; select.add(o);
                });
                document.getElementById('group-select').classList.remove('hidden');
                document.getElementById('vk-area').classList.add('hidden');
            } else { alert("Группы не найдены."); }
        };

        async function confirmGroup() {
            const select = document.getElementById('vk-group-list');
            const { error } = await sb.from('accounts').upsert({
                platform: 'vk', access_token: userToken, account_name: select.options[select.selectedIndex].text, external_id: '-' + select.value
            }, { onConflict: 'platform' });
            if (!error) location.reload();
        }

        async function checkSavedAccount() {
            const { data } = await sb.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
            if (data) {
                document.getElementById('active-acc').classList.remove('hidden');
                document.getElementById('active-acc').innerText = "✅ ПОДКЛЮЧЕНО: " + data.account_name;
                document.getElementById('vk-area').innerHTML = `<button onclick="startVK()" class="text-blue-500 text-xs font-bold underline">СМЕНИТЬ АККАУНТ</button>`;
            }
        }

        async function loadContent() {
            const { data } = await sb.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (!data) return;
            feed.innerHTML = data.length ? '' : '<p class="text-center text-slate-300 mt-20">Пусто</p>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl border shadow-sm text-left mb-4 relative";
                card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold text-blue-500 uppercase">ВКонтакте <span>${new Date(p.publish_date).toLocaleString()}</span></div><p class="text-sm font-medium text-slate-700">${p.text}</p><div class="mt-4 flex justify-between items-center"><span class="text-[9px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-bold uppercase">${p.status}</span><button onclick="delPost(${p.id})" class="text-slate-300 hover:text-red-500"><i class="fa fa-trash-alt"></i></button></div>`;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const t = document.getElementById('post-text').value;
            const d = document.getElementById('post-date').value;
            if (!t || !d) return alert("Заполни всё!");
            await sb.from('posts').insert([{ text: t, publish_date: d, platform: 'vk', status: 'planned' }]);
            closeModal(); loadContent();
        }

        async function delPost(id) {
            if (confirm('Удалить?')) { await sb.from('posts').delete().eq('id', id); loadContent(); }
        }

        function switchTab(id) {
            document.getElementById('view-content').classList.add('hidden');
            document.getElementById('view-accounts').classList.add('hidden');
            document.getElementById('btn-content').classList.remove('active-tab');
            document.getElementById('btn-accounts').classList.remove('active-tab');
            document.getElementById('view-' + id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active-tab');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
