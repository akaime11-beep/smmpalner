<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Управление</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' https://*.vk.com https://unpkg.com; connect-src * 'unsafe-inline' https://*.vk.com https://*.supabase.co; frame-src * https://*.vk.com; img-src * data: blob: https://*.vk.me https://*.userapi.com;">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@vkid/sdk@2.1.0/dist-sdk/umd/index.js"></script>
    <script src="config.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .active-tab { color: #2563eb !important; background-color: #eff6ff !important; border-right: 4px solid #2563eb; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r flex flex-col z-50 shadow-sm">
        <div class="p-6 border-b flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa fa-paper-plane"></i></div>
            <span class="font-bold text-xl">SMM Flow</span>
        </div>
        <nav class="flex-1 py-6 space-y-1">
            <button onclick="switchTab('content')" id="btn-content" class="w-full flex items-center px-6 py-3 text-sm font-semibold active-tab transition-all">
                <i class="fa fa-layer-group w-8"></i> Публикации
            </button>
            <button onclick="switchTab('accounts')" id="btn-accounts" class="w-full flex items-center px-6 py-3 text-sm font-semibold text-slate-400">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col relative">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 z-40">
            <div id="status-text" class="text-[10px] font-bold text-blue-500 uppercase italic">Загрузка...</div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-100">+ Создать пост</button>
        </header>

        <main id="view-content" class="flex-1 p-8 overflow-y-auto">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4"></div>
        </main>

        <main id="view-accounts" class="hidden flex-1 p-8 overflow-y-auto">
            <div class="max-w-md mx-auto bg-white p-10 rounded-[32px] border shadow-sm text-center">
                <i class="fab fa-vk text-5xl text-blue-600 mb-6"></i>
                <h3 class="text-xl font-bold mb-2">ВКонтакте</h3>
                <div id="vk-status-badge" class="mb-6 text-sm text-slate-400">Нажмите «Продолжить» для входа</div>

                <div id="vk-onetap-container" class="flex justify-center mb-6"></div>

                <!-- ВЫБОР ГРУППЫ -->
                <div id="group-select-section" class="hidden mt-6 bg-slate-50 p-6 rounded-2xl border border-dashed border-blue-200 text-left">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3 text-center tracking-widest font-bold">Куда будем постить?</label>
                    <select id="vk-group-list" class="w-full border-none bg-white p-3 rounded-xl shadow-sm outline-none mb-4 text-sm font-bold"></select>
                    <button onclick="saveSelectedGroup()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">ПОДТВЕРДИТЬ ВЫБОР</button>
                </div>

                <div id="vk-connected-info" class="hidden mt-8 p-4 bg-green-50 text-green-700 rounded-2xl border border-green-100 font-bold text-sm"></div>
            </div>
        </main>
    </div>

    <!-- Модалка -->
    <div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4 text-left">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Новый пост</h3>
            <textarea id="post-text" class="w-full h-32 border border-gray-100 bg-gray-50 rounded-2xl p-4 mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ваш текст..."></textarea>
            <input type="datetime-local" id="post-date" class="w-full border border-gray-100 bg-gray-50 rounded-xl p-2 text-sm outline-none">
            <div class="flex space-x-3 mt-6">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold text-slate-500">ОТМЕНА</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg">ЗАПЛАНИРОВАТЬ</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempAccessToken = '';
        let userData = null;

        window.onload = async function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            // 1. Сначала обрабатываем возможный редирект от ВК
            const isRedirect = await handleVKRedirect();

            // 2. Проверяем статус в базе
            await checkAccountStatus();

            // 3. Если это был редирект, переключаемся на вкладку аккаунтов (уже после загрузки DOM)
            if (isRedirect) {
                switchTab('accounts');
            }

            await fetchPosts();
            setTimeout(initVKID, 500);
        };

        function initVKID() {
            if (window.VKIDSDK) {
                const VKID = window.VKIDSDK;
                VKID.Config.init({
                    app: 54580882,
                    redirectUrl: 'https://akaime11-beep.github.io/smmpalner/',
                    responseMode: 'callback',
                    source: 'lowcode',
                    scope: 'groups,wall,offline', 
                });

                const oneTap = new VKID.OneTap();
                oneTap.render({
                    container: document.getElementById('vk-onetap-container'),
                    showAlternativeLogin: true,
                    styles: { width: 300 }
                })
                .on('login_success', (payload) => {
                    processLogin(payload);
                });
            }
        }

        async function handleVKRedirect() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                // Если в URL есть код, значит мы вернулись из ВК
                tempAccessToken = code; // Используем как временный маркер
                window.history.replaceState(null, null, window.location.pathname);
                await fetchUserAndGroups();
                return true;
            }
            return false;
        }

        function processLogin(payload) {
            if (payload.access_token) {
                tempAccessToken = payload.access_token;
                fetchUserAndGroups();
            } else if (payload.code) {
                // Если получили код, обмениваем его через SDK (если возможно на фронте) или используем
                tempAccessToken = payload.code;
                fetchUserAndGroups();
            }
        }

        function fetchUserAndGroups() {
            document.getElementById('status-text').innerText = "Загрузка данных ВК... ⏳";
            
            // Получаем инфо о пользователе
            const scriptUser = document.createElement('script');
            scriptUser.src = `https://api.vk.com/method/users.get?access_token=${tempAccessToken}&v=5.131&callback=vkUserReady`;
            document.body.appendChild(scriptUser);
        }

        window.vkUserReady = function(data) {
            if (data.response) {
                userData = data.response[0];
                const scriptGroups = document.createElement('script');
                scriptGroups.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempAccessToken}&v=5.131&callback=vkGroupsReady`;
                document.body.appendChild(scriptGroups);
            }
        };

        window.vkGroupsReady = function(data) {
            const select = document.getElementById('vk-group-list');
            select.innerHTML = '';

            // 1. Добавляем личный профиль
            const me = document.createElement('option');
            me.value = userData.id;
            me.text = `Личный профиль (${userData.first_name})`;
            select.add(me);

            // 2. Добавляем группы
            if (data.response && data.response.items) {
                data.response.items.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = '-' + g.id;
                    opt.text = `Группа: ${g.name}`;
                    select.add(opt);
                });
            }

            document.getElementById('vk-onetap-container').classList.add('hidden');
            document.getElementById('group-select-section').classList.remove('hidden');
            document.getElementById('status-text').innerText = "Выберите цель ✅";
        };

        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk',
                access_token: tempAccessToken,
                account_name: select.options[select.selectedIndex].text,
                external_id: select.value
            }, { onConflict: 'platform' });

            if (!error) location.reload();
        }

        async function checkAccountStatus() {
            try {
                const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
                if (data) {
                    document.getElementById('vk-connected-info').classList.remove('hidden');
                    document.getElementById('vk-connected-info').innerText = "✅ ПОДКЛЮЧЕНО: " + data.account_name;
                    document.getElementById('vk-onetap-container').innerHTML = `<button onclick="location.reload()" class="text-xs text-blue-500 font-bold underline">СМЕНИТЬ АККАУНТ</button>`;
                }
            } catch(e) {}
            document.getElementById('status-text').innerText = "Система онлайн ✅";
        }

        // --- ИНТЕРФЕЙС ---
        function switchTab(id) {
            const btnContent = document.getElementById('btn-content');
            const btnAccounts = document.getElementById('btn-accounts');
            const viewContent = document.getElementById('view-content');
            const viewAccounts = document.getElementById('view-accounts');

            if (!btnContent || !btnAccounts || !viewContent || !viewAccounts) return;

            viewContent.classList.add('hidden');
            viewAccounts.classList.add('hidden');
            btnContent.classList.remove('active-tab');
            btnAccounts.classList.remove('active-tab');

            document.getElementById('view-' + id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active-tab');
        }

        async function fetchPosts() {
            const { data } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (!data) return;
            feed.innerHTML = data.length ? '' : '<div class="text-center py-20 text-slate-300 font-bold italic">Лента пуста</div>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl border border-gray-100 shadow-sm text-left mb-4 relative";
                card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold uppercase text-blue-500">ВКонтакте <span class="text-slate-400">${new Date(p.publish_date).toLocaleString()}</span></div><p class="text-sm font-medium text-slate-700">${p.text}</p><div class="mt-4 flex justify-between items-center"><span class="text-[9px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-bold uppercase tracking-widest">${p.status}</span><button onclick="delPost(${p.id})" class="text-gray-300 hover:text-red-500 transition-all"><i class="fa fa-trash-alt text-xs"></i></button></div>`;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const t = document.getElementById('post-text').value;
            const d = document.getElementById('post-date').value;
            if (!t || !d) return alert("Заполни данные!");
            await supabaseClient.from('posts').insert([{ text: t, publish_date: d, platform: 'vk', status: 'planned' }]);
            closeModal(); fetchPosts();
        }

        async function delPost(id) {
            if (confirm('Удалить пост?')) { await supabaseClient.from('posts').delete().eq('id', id); fetchPosts(); }
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
