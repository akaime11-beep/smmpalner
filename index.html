<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - FINAL FIX</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' https://*.vk.com https://unpkg.com; connect-src * 'unsafe-inline' https://*.vk.com https://*.supabase.co; frame-src * https://*.vk.com; img-src * data: blob:;">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Подключаем SDK ВК -->
    <script src="https://unpkg.com/@vkid/sdk@2.1.0/dist-sdk/umd/index.js"></script>
    <script src="config.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .active-tab { color: #2563eb !important; background-color: #eff6ff !important; border-right: 3px solid #2563eb; }
        .hidden { display: none !important; }
        .card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r flex flex-col z-50">
        <div class="p-6 border-b flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa fa-paper-plane"></i></div>
            <span class="font-bold text-xl">SMM Flow</span>
        </div>
        <nav class="flex-1 py-6 space-y-1">
            <button onclick="switchTab('content')" id="btn-content" class="w-full flex items-center px-6 py-3 text-sm font-semibold active-tab transition-all">
                <i class="fa fa-layer-group w-8"></i> Публикации
            </button>
            <button onclick="switchTab('accounts')" id="btn-accounts" class="w-full flex items-center px-6 py-3 text-sm font-semibold text-slate-400">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col relative">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 z-40">
            <div id="status-text" class="text-[10px] font-bold text-blue-500 uppercase">Система готова ✅</div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg">
                + Создать пост
            </button>
        </header>

        <main id="view-content" class="flex-1 p-8 overflow-y-auto">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4 font-bold text-slate-400"></div>
        </main>

        <main id="view-accounts" class="hidden flex-1 p-8 overflow-y-auto">
            <div class="max-w-md mx-auto bg-white p-10 rounded-[32px] border shadow-sm text-center">
                <i class="fab fa-vk text-5xl text-blue-600 mb-6"></i>
                <h3 class="text-xl font-bold mb-4">ВКонтакте</h3>
                
                <div id="vk-connection-status" class="mb-6 text-sm text-slate-400 font-medium italic text-sm">Проверка авторизации...</div>

                <div id="vk-onetap-container" class="flex justify-center mb-6 min-h-[50px]"></div>

                <div id="group-select-section" class="hidden mt-6 bg-slate-50 p-6 rounded-2xl border border-dashed border-blue-200 text-left">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 text-center">Выберите сообщество:</p>
                    <select id="vk-group-list" class="w-full border-none bg-white p-3 rounded-xl shadow-sm outline-none mb-4 text-sm font-bold"></select>
                    <button onclick="saveSelectedGroup()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">ПОДТВЕРДИТЬ ВЫБОР</button>
                </div>

                <div id="vk-active-account" class="hidden mt-6 p-4 bg-green-50 text-green-700 rounded-2xl border font-bold text-sm"></div>
            </div>
        </main>
    </div>

    <!-- Модалка -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4 text-left">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Новый пост</h3>
            <textarea id="post-text" class="w-full h-32 border border-slate-100 bg-slate-50 rounded-2xl p-4 mb-4 outline-none" placeholder="Текст..."></textarea>
            <input type="datetime-local" id="post-date" class="w-full border bg-gray-50 rounded-xl p-2 mb-6 outline-none">
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold text-slate-400">ОТМЕНА</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempAccessToken = '';
        let isConnected = false;

        window.onload = async function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            await checkAccountStatus();
            await fetchPosts();
            
            // Если аккаунт не подключен - инициализируем виджет
            if (!isConnected) {
                setTimeout(initVKWidget, 500);
            }
        };

        // --- ИНИЦИАЛИЗАЦИЯ ВИДЖЕТА ВК ---
        function initVKWidget() {
            if (window.VKIDSDK) {
                const VKID = window.VKIDSDK;

                // ИСПОЛЬЗУЕМ СТРОКИ ВМЕСТО ОБЪЕКТОВ, ЧТОБЫ ИЗБЕЖАТЬ ОШИБКИ 'UNDEFINED'
                VKID.Config.init({
                    app: 54580882,
                    redirectUrl: 'https://akaime11-beep.github.io/smmpalner/',
                    responseMode: 'callback', 
                    source: 'lowcode',
                    scope: 'groups,wall,offline', 
                });

                const oneTap = new VKID.OneTap();
                oneTap.render({
                    container: document.getElementById('vk-onetap-container'),
                    showAlternativeLogin: true,
                    styles: { width: 300 }
                })
                .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, function (payload) {
                    if (payload.access_token) {
                        tempAccessToken = payload.access_token;
                        loadGroups();
                    } else if (payload.code) {
                        // Если ВК выдал код - обмениваем его на токен
                        VKID.Auth.exchangeCode(payload.code, payload.device_id)
                          .then(res => {
                              tempAccessToken = res.access_token;
                              loadGroups();
                          })
                          .catch(err => alert("Ошибка прав доступа: " + JSON.stringify(err)));
                    }
                });
            }
        }

        function loadGroups() {
            document.getElementById('vk-onetap-container').classList.add('hidden');
            document.getElementById('vk-connection-status').innerText = "Загружаем ваши группы... ⏳";
            
            // Запрос списка групп через JSONP
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempAccessToken}&v=5.131&callback=vkIn`;
            document.body.appendChild(script);
        }

        window.vkIn = function(data) {
            const select = document.getElementById('vk-group-list');
            if (data.response && data.response.items.length > 0) {
                select.innerHTML = '';
                data.response.items.forEach(g => {
                    const o = document.createElement('option');
                    o.value = g.id; o.text = g.name; select.add(o);
                });
                document.getElementById('group-select-section').classList.remove('hidden');
                document.getElementById('vk-connection-status').innerText = "Авторизация успешна! Выберите группу:";
            } else {
                alert("Сообщества не найдены. Вы должны быть администратором группы.");
            }
        };

        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk', access_token: tempAccessToken,
                account_name: select.options[select.selectedIndex].text,
                external_id: '-' + select.value
            }, { onConflict: 'platform' });
            if (!error) location.reload();
        }

        async function checkAccountStatus() {
            try {
                const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
                const statusInfo = document.getElementById('vk-connection-status');
                if (data) {
                    isConnected = true;
                    statusInfo.innerHTML = `<span class="bg-green-100 text-green-600 px-3 py-1 rounded-full font-bold text-[10px]">✅ ПОДКЛЮЧЕНО: ${data.account_name}</span>`;
                    document.getElementById('vk-onetap-container').innerHTML = `<button onclick="location.reload()" class="text-xs text-blue-500 font-bold underline">СМЕНИТЬ ГРУППУ</button>`;
                } else {
                    statusInfo.innerText = "Аккаунт не подключен.";
                }
            } catch(e) {}
            document.getElementById('status-text').innerText = "Система онлайн ✅";
        }

        // --- БАЗОВЫЕ ФУНКЦИИ ---
        async function fetchPosts() {
            const { data } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (!data) return;
            feed.innerHTML = data.length ? '' : '<div class="text-center py-20 text-slate-300 font-bold italic">Пока пусто</div>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl border border-gray-100 shadow-sm text-left mb-4 relative";
                card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold uppercase text-blue-500">ВКонтакте <span class="text-slate-400 font-medium">${new Date(p.publish_date).toLocaleString()}</span></div><p class="text-sm font-medium text-slate-700 leading-relaxed">${p.text}</p><div class="mt-4 flex justify-between items-center"><span class="text-[9px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-bold uppercase tracking-widest">${p.status}</span><button onclick="delPost(${p.id})" class="text-gray-300 hover:text-red-500 transition-all"><i class="fa fa-trash-alt text-xs"></i></button></div>`;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const t = document.getElementById('post-text').value;
            const d = document.getElementById('post-date').value;
            if (!t || !d) return alert("Заполни всё!");
            await supabaseClient.from('posts').insert([{ text: t, publish_date: d, platform: 'vk', status: 'planned' }]);
            closeModal(); fetchPosts();
        }

        async function delPost(id) {
            if (confirm('Удалить?')) { await supabaseClient.from('posts').delete().eq('id', id); fetchPosts(); }
        }

        function switchTab(id) {
            document.getElementById('view-content').classList.toggle('hidden', id !== 'content');
            document.getElementById('view-accounts').classList.toggle('hidden', id !== 'accounts');
            document.getElementById('btn-content').classList.toggle('active-tab', id === 'content');
            document.getElementById('btn-accounts').classList.toggle('active-tab', id === 'accounts');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
