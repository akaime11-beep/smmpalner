<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Панель управления</title>
    <!-- Мета-тег для разрешения работы скриптов -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob:; style-src * 'unsafe-inline';">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Подключаем конфиг с ключами -->
    <script src="config.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .active-tab { color: #2563eb; background-color: #eff6ff; border-right: 3px solid #2563eb; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- БОКОВОЕ МЕНЮ -->
    <aside class="w-64 bg-white border-r flex flex-col z-20">
        <div class="p-6 flex items-center space-x-3 border-b">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                <i class="fa fa-paper-plane"></i>
            </div>
            <span class="font-bold text-lg tracking-tight text-slate-800">SMM Flow</span>
        </div>
        <nav class="flex-1 py-4">
            <div class="px-6 mb-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Контент</div>
            <button onclick="switchTab('content')" id="nav-content" class="w-full flex items-center px-6 py-3 text-sm font-medium transition active-tab">
                <i class="fa fa-layer-group w-8"></i> Публикации
            </button>
            <div class="px-6 mb-2 mt-6 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Настройки</div>
            <button onclick="switchTab('accounts')" id="nav-accounts" class="w-full flex items-center px-6 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 transition">
                <i class="fa fa-link w-8"></i> Аккаунты ВК
            </button>
        </nav>
    </aside>

    <!-- ОСНОВНАЯ ОБЛАСТЬ -->
    <div class="flex-1 flex flex-col relative">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-sm font-semibold text-gray-400 italic">Синхронизация с облаком...</div>
            <div class="flex items-center space-x-4">
                <button onclick="fetchPosts()" class="text-gray-400 hover:text-blue-600 transition"><i class="fa fa-sync-alt"></i></button>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md transition">
                    + Создать пост
                </button>
            </div>
        </header>

        <!-- ЛЕНТА ПОСТОВ -->
        <main id="view-content" class="flex-1 p-8 overflow-y-auto bg-[#f8fafc]">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4">
                <!-- Посты подгрузятся сюда -->
            </div>
        </main>

        <!-- УПРАВЛЕНИЕ АККАУНТАМИ -->
        <main id="view-accounts" class="hidden flex-1 p-8 overflow-y-auto">
            <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border shadow-sm text-center">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">
                    <i class="fab fa-vk"></i>
                </div>
                <h2 class="text-xl font-bold mb-2 text-slate-800">ВКонтакте</h2>
                <p class="text-sm text-gray-400 mb-8">Подключите ваше сообщество для автоматической публикации постов</p>
                
                <div id="vk-auth-section">
                    <button onclick="startVKAuth()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition">
                        Подключить через VK ID
                    </button>
                </div>

                <!-- Выбор группы (скрыт по умолчанию) -->
                <div id="group-select-section" class="hidden mt-6 bg-slate-50 p-6 rounded-2xl border border-dashed border-slate-200">
                    <p class="text-xs font-bold text-slate-500 uppercase mb-4 text-left tracking-wider">Выберите группу:</p>
                    <select id="vk-group-list" class="w-full border border-white bg-white p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 shadow-sm mb-4"></select>
                    <button onclick="saveSelectedGroup()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition shadow-lg shadow-green-100">
                        Подтвердить выбор
                    </button>
                </div>

                <div id="account-status" class="mt-8"></div>
            </div>
        </main>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО СОЗДАНИЯ -->
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800">Новая публикация</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition"><i class="fa fa-times"></i></button>
            </div>
            
            <textarea id="post-text" class="w-full h-40 border border-slate-100 bg-slate-50 rounded-2xl p-4 mb-6 outline-none focus:ring-2 focus:ring-blue-500 transition resize-none" placeholder="Напишите текст поста..."></textarea>
            
            <div class="mb-8">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Когда опубликовать?</label>
                <input type="datetime-local" id="post-date" class="w-full border border-slate-100 bg-slate-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200 transition">Отмена</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Запланировать</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempToken = '';

        window.onload = function() {
            if (typeof S_URL === 'undefined' || typeof S_KEY === 'undefined' || typeof VK_APP_ID === 'undefined') {
                document.getElementById('status-text').innerText = "Конфигурация не найдена ❌";
                return;
            }
            
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            // Обработка возврата из ВК
            handleVKResponse();
            // Проверка текущего аккаунта
            checkAccountStatus();
            // Загрузка постов
            fetchPosts();
        };

        // --- ЛОГИКА ВК АВТОРИЗАЦИИ ---

        function startVKAuth() {
            // АВТОМАТИЧЕСКИЙ redirect_uri: берем текущий адрес и убираем слэш на конце
            const redirectUri = window.location.origin + window.location.pathname.replace(/\/$/, "");
            
            console.log("Авторизация через Redirect URI:", redirectUri);
            
            const scope = 'groups,wall,offline,admin';
            const authUrl = `https://oauth.vk.com/authorize?client_id=${VK_APP_ID}&display=page&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${scope}&response_type=token&v=5.131`;
            
            window.location.href = authUrl;
        }

        async function handleVKResponse() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                tempToken = params.get('access_token');
                
                // Очищаем адресную строку для красоты
                window.history.replaceState(null, null, window.location.pathname);
                
                // Запускаем выбор групп
                loadAdminGroups();
            }
        }

        function loadAdminGroups() {
            document.getElementById('vk-auth-section').classList.add('hidden');
            document.getElementById('group-select-section').classList.remove('hidden');
            
            // Получаем группы через JSONP (чтобы не было CORS ошибок)
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempToken}&v=5.131&callback=vkCallback`;
            document.body.appendChild(script);
        }

        window.vkCallback = function(res) {
            const select = document.getElementById('vk-group-list');
            if (res.response && res.response.items) {
                res.response.items.forEach(group => {
                    const opt = document.createElement('option');
                    opt.value = group.id;
                    opt.text = group.name;
                    select.add(opt);
                });
            } else {
                alert("Ошибка загрузки групп. Убедитесь, что вы админ хотя бы в одном сообществе.");
            }
        };

        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const groupId = select.value;
            const groupName = select.options[select.selectedIndex].text;

            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk',
                access_token: tempToken,
                account_name: groupName,
                external_id: '-' + groupId // Сохраняем с минусом для постов в ВК
            }, { onConflict: 'platform' });

            if (!error) {
                alert("Успешно! Теперь посты будут уходить в " + groupName);
                location.reload();
            } else {
                alert("Ошибка сохранения: " + error.message);
            }
        }

        async function checkAccountStatus() {
            const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').single();
            if (data) {
                document.getElementById('account-status').innerHTML = `
                    <div class="p-5 bg-blue-50 border border-blue-100 rounded-2xl text-left">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white"><i class="fab fa-vk"></i></div>
                            <div>
                                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest leading-none">Подключено</p>
                                <p class="font-bold text-blue-900">${data.account_name}</p>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('vk-auth-section').innerHTML = `
                    <button onclick="startVKAuth()" class="w-full text-blue-600 font-bold text-sm hover:underline transition">Сменить сообщество</button>
                `;
            }
            document.getElementById('status-text').innerText = "Система онлайн ✅";
        }

        // --- ЛОГИКА ПОСТОВ ---

        async function fetchPosts() {
            const { data, error } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            
            if (error) {
                feed.innerHTML = '<div class="p-8 text-center text-red-400">Ошибка загрузки данных</div>';
                return;
            }

            feed.innerHTML = data.length ? '' : `
                <div class="p-20 text-center border-2 border-dashed border-slate-200 rounded-3xl">
                    <p class="text-slate-400 font-medium">Лента пуста.<br>Самое время что-то запланировать!</p>
                </div>
            `;
            
            data.forEach(post => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition text-left relative overflow-hidden group";
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <div class="flex items-center space-x-2">
                            <div class="w-6 h-6 bg-slate-100 rounded-md flex items-center justify-center text-[10px] text-slate-500 font-bold">VK</div>
                            <span class="text-[11px] font-bold text-slate-400">${new Date(post.publish_date).toLocaleString()}</span>
                        </div>
                        <span class="text-[10px] px-2 py-1 rounded-md font-bold uppercase tracking-wider ${post.status === 'published' ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'}">
                            ${post.status === 'published' ? 'Опубликовано' : 'В очереди'}
                        </span>
                    </div>
                    <p class="text-slate-700 text-sm leading-relaxed">${post.text}</p>
                    <div class="absolute top-0 right-0 p-2 opacity-0 group-hover:opacity-100 transition">
                         <button onclick="deletePost(${post.id})" class="text-slate-300 hover:text-red-500"><i class="fa fa-trash-alt text-xs"></i></button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const btn = document.getElementById('save-btn');
            const text = document.getElementById('post-text').value;
            const date = document.getElementById('post-date').value;

            if (!text || !date) return alert("Пожалуйста, заполните все поля");

            btn.innerText = "Сохранение...";
            btn.disabled = true;

            const { error } = await supabaseClient.from('posts').insert([{
                text: text,
                publish_date: date,
                platform: 'vk',
                status: 'planned'
            }]);

            if (!error) {
                closeModal();
                fetchPosts();
                document.getElementById('post-text').value = '';
            } else {
                alert("Ошибка: " + error.message);
            }
            btn.innerText = "Запланировать";
            btn.disabled = false;
        }

        async function deletePost(id) {
            if (!confirm("Удалить этот пост?")) return;
            await supabaseClient.from('posts').delete().eq('id', id);
            fetchPosts();
        }

        // --- УТИЛИТЫ ---

        function switchTab(tab) {
            document.getElementById('view-content').classList.toggle('hidden', tab !== 'content');
            document.getElementById('view-accounts').classList.toggle('hidden', tab !== 'accounts');
            document.getElementById('nav-content').classList.toggle('active-tab', tab === 'content');
            document.getElementById('nav-accounts').classList.toggle('active-tab', tab === 'accounts');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    </script>

    // ... (начало кода остается тем же, меняем только блок скриптов) ...

    <script>
        let supabaseClient;
        let tempToken = '';

        window.onload = function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            handleAuthCallback();
            checkExistingAccount();
            fetchPosts();
        };

        function startVKAuth() {
            // Берем текущий адрес БЕЗ хэша и БЕЗ лишних слэшей в конце
            const redirectUri = window.location.origin + window.location.pathname.replace(/\/$/, "");
            
            // Если ты хочешь ПРОВЕРИТЬ адрес, раскомментируй строку ниже:
            // alert("Адрес для настроек ВК: " + redirectUri); 

            const scope = 'groups,wall,offline,admin';
            const authUrl = `https://oauth.vk.com/authorize?client_id=${VK_APP_ID}&display=page&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${scope}&response_type=token&v=5.131`;
            
            window.location.href = authUrl;
        }

        async function handleAuthCallback() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                tempToken = params.get('access_token');
                window.location.hash = '';
                loadAdminGroups();
            } else if (hash.includes('error')) {
                alert("ВК вернул ошибку. Проверьте настройки Redirect URI.");
            }
        }

        function loadAdminGroups() {
            document.getElementById('vk-auth-section').classList.add('hidden');
            document.getElementById('group-select-section').classList.remove('hidden');
            
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempToken}&v=5.131&callback=vkCallback`;
            document.body.appendChild(script);
        }

        window.vkCallback = function(res) {
            const select = document.getElementById('vk-group-list');
            if (res.response && res.response.items) {
                res.response.items.forEach(group => {
                    const opt = document.createElement('option');
                    opt.value = group.id;
                    opt.text = group.name;
                    select.add(opt);
                });
            } else if (res.error) {
                alert("Ошибка ВК: " + res.error.error_msg);
            }
        };

        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const groupId = select.value;
            const groupName = select.options[select.selectedIndex].text;

            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk',
                access_token: tempToken,
                account_name: groupName,
                external_id: '-' + groupId
            }, { onConflict: 'platform' });

            if (!error) {
                alert("Успешно привязано!");
                location.reload();
            } else {
                alert("Ошибка БД (проверьте, создана ли таблица accounts): " + error.message);
            }
        }

        async function checkExistingAccount() {
            try {
                const { data, error } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
                if (data) {
                    document.getElementById('account-status').innerHTML = `<div class="p-4 bg-green-50 text-green-700 rounded-xl border border-green-200 font-bold">✅ Активен: ${data.account_name}</div>`;
                    document.getElementById('vk-auth-section').innerHTML = `<button onclick="startVKAuth()" class="w-full border border-blue-200 text-blue-600 py-2 rounded-xl text-sm mt-4">Сменить сообщество</button>`;
                }
            } catch (e) {
                console.log("Таблица accounts еще не готова.");
            }
            document.getElementById('status-text').innerText = "Система онлайн ✅";
        }

        // ... (остальные функции switchTab, fetchPosts, savePost остаются без изменений) ...
</body>
</html>
