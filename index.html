<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SMM Flow - Управление</title>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' https://*.vk.com https://unpkg.com; connect-src * 'unsafe-inline' https://*.vk.com https://*.supabase.co; frame-src * https://*.vk.com; img-src * data: blob:;">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
    <script src="config.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .active-tab { color: #2563eb !important; background-color: #eff6ff !important; border-right: 4px solid #2563eb; }
        .hidden { display: none !important; }
        .card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r flex flex-col z-50">
        <div class="p-6 border-b flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa fa-paper-plane"></i></div>
            <span class="font-bold text-xl tracking-tight">SMM Flow</span>
        </div>
        <nav class="flex-1 py-6 space-y-1">
            <button onclick="switchTab('content')" id="btn-content" class="w-full flex items-center px-6 py-3 text-sm font-semibold active-tab">
                <i class="fa fa-layer-group w-8"></i> Публикации
            </button>
            <button onclick="switchTab('accounts')" id="btn-accounts" class="w-full flex items-center px-6 py-3 text-sm font-semibold text-slate-400 hover:text-slate-600">
                <i class="fa fa-link w-8"></i> Аккаунты
            </button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <div id="status-text" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest italic">Загрузка...</div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-100">
                + Создать пост
            </button>
        </header>

        <main id="view-content" class="flex-1 p-8 overflow-y-auto">
            <div id="post-feed" class="max-w-2xl mx-auto space-y-4"></div>
        </main>

        <main id="view-accounts" class="hidden flex-1 p-8 overflow-y-auto">
            <div class="max-w-md mx-auto">
                <div class="card p-8 text-center" id="vk-card">
                    <i class="fab fa-vk text-5xl text-blue-600 mb-4"></i>
                    <h3 class="text-xl font-bold mb-2">ВКонтакте</h3>
                    
                    <!-- Статус подключения -->
                    <div id="vk-connection-status" class="mb-6 text-sm text-slate-400 font-medium">Проверка...</div>

                    <!-- Выбор группы -->
                    <div id="group-select-section" class="hidden mt-4 p-5 bg-slate-50 rounded-2xl border border-dashed border-blue-200 text-left">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-3">Ваши сообщества (админ):</label>
                        <select id="vk-group-list" class="w-full bg-white border p-3 rounded-xl shadow-sm outline-none mb-4 text-sm font-bold"></select>
                        <button onclick="saveSelectedGroup()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">Подключить выбранное</button>
                    </div>

                    <!-- Кнопка отключения -->
                    <div id="vk-logout-section" class="hidden mt-6">
                        <button onclick="disconnectVK()" class="text-xs text-red-400 font-bold hover:text-red-600 transition underline">Отключить аккаунт</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Модалка -->
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-slate-800">Новый пост</h3>
            <textarea id="post-text" class="w-full h-40 border border-slate-100 bg-slate-50 rounded-2xl p-5 mb-6 outline-none focus:ring-2 focus:ring-blue-500 transition-all resize-none" placeholder="О чем сегодня расскажем?"></textarea>
            <input type="datetime-local" id="post-date" class="w-full border border-slate-100 bg-slate-50 rounded-xl p-3 mb-6 outline-none focus:ring-2 focus:ring-blue-500 font-bold">
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 text-slate-500 py-4 rounded-2xl font-bold">ОТМЕНА</button>
                <button onclick="savePost()" id="save-btn" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100">ЗАПЛАНИРОВАТЬ</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let tempToken = '';
        let isAccountConnected = false;

        window.onload = async function() {
            if (typeof S_URL === 'undefined') return;
            supabaseClient = supabase.createClient(S_URL, S_KEY);
            
            // 1. Проверяем, подключен ли уже кто-то
            await checkAccountStatus();
            
            // 2. Показываем виджет ТОЛЬКО если не подключен
            if (!isAccountConnected) {
                initVKFloatingOneTap();
            }

            await fetchPosts();
        };

        async function checkAccountStatus() {
            try {
                const { data } = await supabaseClient.from('accounts').select('*').eq('platform', 'vk').maybeSingle();
                const statusDiv = document.getElementById('vk-connection-status');
                
                if (data) {
                    isAccountConnected = true;
                    statusDiv.innerHTML = `<div class="bg-green-100 text-green-600 px-4 py-2 rounded-full font-bold text-xs inline-block">✅ ПОДКЛЮЧЕНО: ${data.account_name}</div>`;
                    document.getElementById('vk-logout-section').classList.remove('hidden');
                } else {
                    isAccountConnected = false;
                    statusDiv.innerText = "Аккаунт не подключен. Используйте OneTap для входа.";
                }
                document.getElementById('status-text').innerText = "Система онлайн ✅";
            } catch(e) { console.error(e); }
        }

        function initVKFloatingOneTap() {
            if ('VKIDSDK' in window) {
                const VKID = window.VKIDSDK;
                VKID.Config.init({
                    app: 54580882,
                    redirectUrl: 'https://akaime11-beep.github.io/smmpalner/',
                    responseMode: VKID.ConfigResponseMode.Callback,
                    source: VKID.ConfigSource.LOWCODE,
                    scope: 'groups,wall,offline', // ОБЯЗАТЕЛЬНЫЕ ПРАВА
                });

                const floatingOneTap = new VKID.FloatingOneTap();
                floatingOneTap.render({ appName: 'SMM Flow', showAlternativeLogin: true })
                .on(VKID.FloatingOneTapInternalEvents.LOGIN_SUCCESS, function (payload) {
                    // Обмен кода на токен
                    VKID.Auth.exchangeCode(payload.code, payload.device_id)
                        .then(data => {
                            tempToken = data.access_token;
                            floatingOneTap.close();
                            loadGroups();
                        })
                        .catch(err => alert("Ошибка при получении прав: " + JSON.stringify(err)));
                });
            }
        }

        function loadGroups() {
            switchTab('accounts');
            document.getElementById('vk-connection-status').innerText = "Загружаем ваши группы... ⏳";
            
            // Используем JSONP для обхода CORS
            const script = document.createElement('script');
            script.src = `https://api.vk.com/method/groups.get?extended=1&filter=admin&access_token=${tempToken}&v=5.131&callback=vkCallback`;
            document.body.appendChild(script);
        }

        window.vkCallback = function(data) {
            if (data.error) {
                alert("Ошибка ВК: " + data.error.error_msg);
                console.error(data.error);
                return;
            }

            const select = document.getElementById('vk-group-list');
            if (data.response?.items?.length > 0) {
                select.innerHTML = '';
                data.response.items.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id; opt.text = g.name; select.add(opt);
                });
                document.getElementById('group-select-section').classList.remove('hidden');
                document.getElementById('vk-connection-status').innerText = "Группы найдены! Выберите нужную:";
            } else {
                alert("ВК не вернул ни одной группы, где вы Администратор.");
                document.getElementById('vk-connection-status').innerText = "Группы не найдены ❌";
            }
        };

        async function saveSelectedGroup() {
            const select = document.getElementById('vk-group-list');
            const { error } = await supabaseClient.from('accounts').upsert({
                platform: 'vk', access_token: tempToken,
                account_name: select.options[select.selectedIndex].text,
                external_id: '-' + select.value
            }, { onConflict: 'platform' });
            
            if (!error) location.reload();
        }

        async function disconnectVK() {
            if (confirm("Вы уверены, что хотите отключить ВК?")) {
                await supabaseClient.from('accounts').delete().eq('platform', 'vk');
                location.reload();
            }
        }

        // --- БАЗОВЫЕ ФУНКЦИИ ---
        async function fetchPosts() {
            const { data } = await supabaseClient.from('posts').select('*').order('publish_date', { ascending: false });
            const feed = document.getElementById('post-feed');
            if (!data) return;
            feed.innerHTML = data.length ? '' : '<div class="text-center py-20 text-slate-300 font-bold italic">Пока пусто</div>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "card p-6 text-left mb-4 shadow-sm";
                card.innerHTML = `<div class="flex justify-between mb-2 text-[10px] font-bold uppercase text-blue-500">ВК <span class="text-slate-400">${new Date(p.publish_date).toLocaleString()}</span></div><p class="text-sm font-medium text-slate-700">${p.text}</p><div class="mt-4 flex justify-between items-center"><span class="text-[9px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-bold uppercase tracking-widest">${p.status}</span><button onclick="deletePost(${p.id})" class="text-slate-300 hover:text-red-500 transition-all"><i class="fa fa-trash-alt text-xs"></i></button></div>`;
                feed.appendChild(card);
            });
        }

        async function savePost() {
            const text = document.getElementById('post-text').value;
            const date = document.getElementById('post-date').value;
            if (!text || !date) return alert("Заполни данные!");
            await supabaseClient.from('posts').insert([{ text, publish_date: date, platform: 'vk', status: 'planned' }]);
            closeModal(); fetchPosts();
        }

        async function deletePost(id) {
            if (confirm('Удалить пост?')) { await supabaseClient.from('posts').delete().eq('id', id); fetchPosts(); }
        }

        function switchTab(t) {
            document.getElementById('view-content').classList.toggle('hidden', t !== 'content');
            document.getElementById('view-accounts').classList.toggle('hidden', t !== 'accounts');
            document.getElementById('btn-content').classList.toggle('active-tab', t === 'content');
            document.getElementById('btn-accounts').classList.toggle('active-tab', t === 'accounts');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
